version: '3.8'

# Bot services (bots/jitsi-bot/, bots/security-bot/, etc.) are not run locally.
# To run a bot locally, add a service entry here pointing to bots/<name>/.
# Example:
#   jitsi-bot:
#     build: ./bots/jitsi-bot
#     ports: ["3001:3001"]
#     environment:
#       - BOT_USERNAME=jitsi-bot
#       - ...

services:
  routemaker:
    build:
      context: ./routemaker
      dockerfile: Dockerfile
    container_name: routemaker-local
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=development
      - SESSION_SECRET=local-dev-secret-change-in-production
    volumes:
      - ./routemaker/data:/app/data
      - ./routemaker/public:/app/public:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
