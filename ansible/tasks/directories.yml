---
# Directory Creation Tasks
- name: Create docker compose directory
  file:
    path: /opt/services
    state: directory
    mode: '0755'

- name: Create service directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/services/wireguard-ui
    - /opt/services/traefik/dynamic
    - /opt/services/traefik/acme
    - /opt/services/jitsi/prosody/config
    - /opt/services/jitsi/prosody/prosody-plugins-custom
    - /opt/services/matrix/synapse
    - /opt/services/matrix/postgres
    - /opt/services/matrix/element
    - /opt/services/well-known/matrix
    - /opt/services/routemaker
    - /opt/services/routemaker/data
    - /opt/services/routemaker/public
    - /opt/services/bots
    - /opt/services/bots/jitsi-bot
    - /opt/services/bots/security-bot
    - /opt/services/bots/security-bot/data
    - /opt/services/bots/media-bot
    - /opt/services/bots/media-bot/data
    - /opt/services/bots/media-bot/data/media
    - /opt/backup
    - /opt/backup/db

- name: Create backup script directory
  file:
    path: /opt/backup
    state: directory
    mode: '0700'

- name: Create backup log file
  file:
    path: /var/log/backup.log
    state: touch
    mode: '0644'
