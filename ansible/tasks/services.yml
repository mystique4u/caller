---
# Service Deployment and Health Checks
- name: Create Docker Compose file
  template:
    src: docker-compose.yml.j2
    dest: /opt/services/docker-compose.yml
    mode: '0644'

- name: Pull and start Docker services
  shell: |
    cd /opt/services
    docker compose pull --ignore-pull-failures || true
    docker compose down || true
    docker compose up -d
  args:
    executable: /bin/bash
  retries: 3
  delay: 10
  register: docker_result
  until: docker_result.rc == 0

- name: Wait for services to be ready
  wait_for:
    port: "{{ item }}"
    host: 127.0.0.1
    timeout: 60
    delay: 5
  loop:
    - 80
    - 443
  ignore_errors: yes

- name: Wait for Traefik to be healthy
  uri:
    url: "http://127.0.0.1:8080/ping"
    method: GET
    status_code: 200
  register: result
  until: result.status == 200
  retries: 12
  delay: 5
  ignore_errors: yes

- name: Check Matrix Synapse health
  uri:
    url: "http://127.0.0.1:8008/health"
    method: GET
    status_code: 200
  register: synapse_health
  until: synapse_health.status == 200
  retries: 12
  delay: 5
  ignore_errors: yes
  
- name: Display Synapse health status
  debug:
    msg: "Matrix Synapse health: {{ 'OK' if synapse_health.status == 200 else 'FAILED' }}"

- name: Wait for Jitsi Prosody to be ready
  wait_for:
    timeout: 30
  delegate_to: localhost

- name: Fix Jitsi authdomain in config.js
  shell: |
    docker exec jitsi-web sed -i "s/config.hosts.authdomain = 'meet.jitsi';/config.hosts.authdomain = 'auth.meet.jitsi';/g" /config/config.js
    docker exec jitsi-web nginx -s reload
  register: fix_config_result
  failed_when: false
  changed_when: true

- name: Create Jitsi admin user
  shell: |
    docker exec jitsi-prosody prosodyctl --config /config/prosody.cfg.lua register {{ jitsi_admin_user }} auth.meet.jitsi {{ jitsi_admin_password }}
  register: create_user_result
  failed_when: false
  changed_when: "'already registered' not in create_user_result.stderr"
  when: jitsi_admin_user is defined and jitsi_admin_password is defined

- name: Wait for Matrix Synapse to be ready
  wait_for:
    timeout: 30
  delegate_to: localhost
  when: matrix_admin_user is defined and matrix_admin_password is defined

- name: Create Matrix admin user
  shell: |
    docker exec matrix-synapse register_new_matrix_user -u {{ matrix_admin_user }} -p {{ matrix_admin_password }} --admin -c /data/homeserver.yaml http://localhost:8008
  register: matrix_user_result
  failed_when: false
  changed_when: "'User ID already taken' not in matrix_user_result.stderr and matrix_user_result.rc == 0"
  when: matrix_admin_user is defined and matrix_admin_password is defined

- name: Run post-deployment health checks
  shell: |
    echo "=== Service Health Check ==="
    echo "Checking Docker containers..."
    docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "traefik|matrix|element|livekit"
    
    echo ""
    echo "Checking Matrix Synapse health..."
    curl -s http://localhost:8008/health || echo "Synapse health check failed"
    
    echo ""
    echo "Checking PostgreSQL..."
    docker exec matrix-postgres pg_isready -U synapse || echo "PostgreSQL not ready"
    
    echo ""
    echo "Checking configuration files..."
    test -f /opt/services/well-known/matrix/client && echo "✓ .well-known/matrix/client exists" || echo "✗ Missing"
    test -f /opt/services/well-known/matrix/server && echo "✓ .well-known/matrix/server exists" || echo "✗ Missing"
    
    echo ""
    echo "Checking for recent errors in Synapse..."
    docker logs matrix-synapse --tail 20 2>&1 | grep -i "error\|exception" | tail -5 || echo "No recent errors"
  register: health_check
  changed_when: false
  ignore_errors: yes

- name: Display health check results
  debug:
    msg: "{{ health_check.stdout_lines }}"
  when: health_check is defined

- name: Display admin credentials
  debug:
    msg:
      - "=========================================="
      - "Services Admin Access"
      - "=========================================="
      - "Jitsi Meet: https://meet.{{ domain_name }}"
      - "  Username: {{ jitsi_admin_user }}@auth.meet.jitsi"
      - "  Password: (stored in GitHub Secrets)"
      - ""
      - "Matrix/Element: https://chat.{{ domain_name }}"
      - "  Username: @{{ matrix_admin_user }}:{{ domain_name }}"
      - "  Password: (stored in GitHub Secrets)"
      - "  Homeserver: https://matrix.{{ domain_name }}"
      - "=========================================="
  when: jitsi_admin_user is defined or matrix_admin_user is defined
  ignore_errors: yes

- name: Display WireGuard status
  command: wg show
  register: wg_status
  changed_when: false
  failed_when: false

- name: Show server information with domain
  debug:
    msg:
      - "=============================================="
      - "VPN and Services Server is Ready with HTTPS!"
      - "=============================================="
      - "Domain: {{ domain_name }}"
      - "Server IP: {{ server_ip }}"
      - ""
      - "Services:"
      - "  - Traefik Dashboard: https://{{ domain_name }}:8080/dashboard/"
      - "  - WireGuard UI: https://vpn.{{ domain_name }}"
      - "    Default login: admin / admin (CHANGE THIS!)"
      - "  - Jitsi Meet: https://meet.{{ domain_name }}"
      - "    No authentication required - ready to use!"
      - ""
      - "DNS Configuration:"
      - "  Update your domain's nameservers to:"
      - "    - hydrogen.ns.hetzner.com"
      - "    - oxygen.ns.hetzner.com"
      - "    - helium.ns.hetzner.de"
      - ""
      - "=============================================="
