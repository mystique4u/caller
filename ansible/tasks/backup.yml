---
# Backup Configuration Tasks
#
# Uses lftp mirror (rsync-equivalent over SFTP) to keep StorageBox in sync with
# the current server state. No snapshots — StorageBox always reflects exactly
# what is on the server right now.
#
# StorageBox structure:
#   /home/backups/hosts/caller/state/
#     db/               ← pg_dump output (always current)
#     traefik/          ← /opt/services/traefik/
#     matrix-synapse/   ← /opt/services/matrix/synapse/
#     jitsi/            ← /opt/services/jitsi/
#     wireguard/        ← /etc/wireguard/
#     wireguard-ui/     ← /opt/services/wireguard-ui/
#     routemaker-data/  ← /opt/services/routemaker/data/
#     mailserver/       ← /opt/services/mailserver/
#     bots/             ← /opt/services/bots/ (includes .credentials + sessions)

- name: Create backup directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0700'
  loop:
    - /opt/backup
    - /opt/backup/db

- name: Deploy state-sync script
  copy:
    content: |
      #!/bin/bash
      set -euo pipefail

      # state-sync.sh — mirrors /opt/services persistent state to Hetzner StorageBox.
      # Uses lftp mirror with --delete: StorageBox always matches current server state.
      # No timestamps, no rotation, no wasted space.
      #
      # Environment variables required (set via cron env or exported before running):
      #   STORAGEBOX_HOST, STORAGEBOX_USER, STORAGEBOX_PASSWORD
      #   Optionally: STORAGEBOX_PORT (default: 23)

      SB_HOST="${STORAGEBOX_HOST}"
      SB_USER="${STORAGEBOX_USER}"
      SB_PASS="${STORAGEBOX_PASSWORD}"
      SB_PORT="${STORAGEBOX_PORT:-23}"
      REMOTE_STATE="/home/backups/hosts/caller/state"

      lftp_mirror_up() {
          local src="$1" dest="$2" opts="${3:-}"
          lftp -u "${SB_USER},${SB_PASS}" -p "${SB_PORT}" "sftp://${SB_HOST}" << LFTP
      set sftp:auto-confirm yes
      set ssl:verify-certificate no
      mkdir -p ${REMOTE_STATE}/${dest}
      mirror -R --delete ${opts} ${src} ${REMOTE_STATE}/${dest}
      bye
      LFTP
      }

      echo "=== State sync started at $(date) ==="

      echo "🗄️  PostgreSQL — dumping..."
      mkdir -p /opt/backup/db
      docker exec matrix-postgres pg_dump -U synapse synapse > /opt/backup/db/synapse.sql
      echo "🗄️  PostgreSQL — syncing dump..."
      lftp_mirror_up /opt/backup/db db

      echo "🔒 Traefik (SSL certs + dynamic config)..."
      lftp_mirror_up /opt/services/traefik traefik

      echo "💬 Matrix Synapse data (config, media store, signing key)..."
      lftp_mirror_up /opt/services/matrix/synapse matrix-synapse

      echo "📹 Jitsi config..."
      lftp_mirror_up /opt/services/jitsi jitsi

      echo "🔐 WireGuard kernel config..."
      lftp_mirror_up /etc/wireguard wireguard

      echo "🔐 WireGuard UI database..."
      lftp_mirror_up /opt/services/wireguard-ui wireguard-ui

      echo "🗺️  RouteMaker data..."
      lftp_mirror_up /opt/services/routemaker/data routemaker-data

      echo "📧 Mail server (accounts, DKIM keys, config)..."
      lftp_mirror_up /opt/services/mailserver mailserver

      echo "🤖 Bots (credentials, tokens, sessions — excluding in-progress downloads)..."
      lftp_mirror_up /opt/services/bots bots "-x 'media-bot/data/media'"

      echo "=== State sync complete at $(date) ==="
    dest: /opt/backup/state-sync.sh
    mode: '0700'

- name: Deploy state-restore script
  copy:
    content: |
      #!/bin/bash
      set -euo pipefail

      # state-restore.sh — restores persistent state from Hetzner StorageBox.
      # Reverse of state-sync.sh. Run on a fresh server after Ansible deploy
      # to recover all persistent data.
      #
      # Usage:
      #   STORAGEBOX_HOST=... STORAGEBOX_USER=... STORAGEBOX_PASSWORD=... \
      #     /opt/backup/state-restore.sh

      SB_HOST="${STORAGEBOX_HOST}"
      SB_USER="${STORAGEBOX_USER}"
      SB_PASS="${STORAGEBOX_PASSWORD}"
      SB_PORT="${STORAGEBOX_PORT:-23}"
      REMOTE_STATE="/home/backups/hosts/caller/state"

      lftp_mirror_down() {
          local src="$1" dst="$2"
          mkdir -p "$dst"
          lftp -u "${SB_USER},${SB_PASS}" -p "${SB_PORT}" "sftp://${SB_HOST}" << LFTP
      set sftp:auto-confirm yes
      set ssl:verify-certificate no
      mirror --delete ${REMOTE_STATE}/${src} ${dst}
      bye
      LFTP
      }

      echo "=== State restore started at $(date) ==="

      echo "⏸️  Stopping all services..."
      cd /opt/services && docker compose down 2>/dev/null || true

      echo "🔒 Restoring Traefik..."
      lftp_mirror_down traefik /opt/services/traefik
      chmod 600 /opt/services/traefik/acme/acme.json 2>/dev/null || true

      echo "💬 Restoring Matrix Synapse data..."
      lftp_mirror_down matrix-synapse /opt/services/matrix/synapse

      echo "📹 Restoring Jitsi config..."
      lftp_mirror_down jitsi /opt/services/jitsi

      echo "🔐 Restoring WireGuard..."
      lftp_mirror_down wireguard /etc/wireguard
      chmod 600 /etc/wireguard/*.conf 2>/dev/null || true
      lftp_mirror_down wireguard-ui /opt/services/wireguard-ui

      echo "🗺️  Restoring RouteMaker data..."
      lftp_mirror_down routemaker-data /opt/services/routemaker/data

      echo "📧 Restoring mail server..."
      lftp_mirror_down mailserver /opt/services/mailserver

      echo "🤖 Restoring bots (credentials + state)..."
      lftp_mirror_down bots /opt/services/bots
      find /opt/services/bots -name '.credentials' -exec chmod 600 {} \;

      echo "🗄️  Restoring PostgreSQL..."
      lftp_mirror_down db /opt/backup/db
      if [ -f /opt/backup/db/synapse.sql ]; then
          cd /opt/services && docker compose up -d matrix-postgres
          echo "⏳ Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
              docker exec matrix-postgres pg_isready -U synapse > /dev/null 2>&1 && break
              sleep 2
          done
          echo "  Dropping existing schema and restoring from dump..."
          docker exec matrix-postgres psql -U synapse -c \
              "DROP SCHEMA public CASCADE; CREATE SCHEMA public;" 2>/dev/null || true
          docker exec -i matrix-postgres psql -U synapse synapse < /opt/backup/db/synapse.sql
          echo "✅ Database restored"
      else
          echo "⚠️  No database dump found at /opt/backup/db/synapse.sql"
      fi

      echo "🔄 Starting all services..."
      cd /opt/services && docker compose up -d

      echo "⏳ Waiting 15s for services to initialise..."
      sleep 15

      echo "📊 Service status:"
      docker compose -f /opt/services/docker-compose.yml ps

      echo "=== State restore complete at $(date) ==="
    dest: /opt/backup/state-restore.sh
    mode: '0700'

- name: Set StorageBox credentials in cron environment
  cron:
    name: "{{ item.name }}"
    env: yes
    value: "{{ item.value }}"
    user: root
  loop:
    - name: STORAGEBOX_HOST
      value: "{{ lookup('env', 'STORAGEBOX_HOST') }}"
    - name: STORAGEBOX_USER
      value: "{{ lookup('env', 'STORAGEBOX_USER') }}"
    - name: STORAGEBOX_PASSWORD
      value: "{{ lookup('env', 'STORAGEBOX_PASSWORD') }}"

- name: Create daily state-sync cron job (2 AM)
  cron:
    name: "Daily state sync to StorageBox"
    minute: "0"
    hour: "2"
    job: "/opt/backup/state-sync.sh >> /var/log/backup.log 2>&1"
    user: root

- name: Run initial state sync
  shell: /opt/backup/state-sync.sh
  environment:
    STORAGEBOX_HOST:     "{{ lookup('env', 'STORAGEBOX_HOST') }}"
    STORAGEBOX_USER:     "{{ lookup('env', 'STORAGEBOX_USER') }}"
    STORAGEBOX_PASSWORD: "{{ lookup('env', 'STORAGEBOX_PASSWORD') }}"
  register: sync_result
  ignore_errors: yes

- name: Display sync result
  debug:
    msg: "{{ sync_result.stdout_lines | default(['Sync completed']) }}"
  when: sync_result is defined

- name: Display sync errors if any
  debug:
    msg: "{{ sync_result.stderr_lines | default(['No errors']) }}"
  when: sync_result is defined and sync_result.failed

