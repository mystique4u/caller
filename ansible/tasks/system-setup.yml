---
# System Setup Tasks
- name: Wait for server to be ready
  wait_for_connection:
    timeout: 300
    delay: 0

- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Update apt cache and install all packages in one pass
  apt:
    update_cache: yes
    cache_valid_time: 3600
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - wireguard
      - wireguard-tools
      - iptables
      - net-tools
      - htop
      - vim
      - wget
      - git
      - python3-pip
      - sshpass
      - lftp
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Enable IP forwarding for VPN
  sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - net.ipv4.ip_forward
    - net.ipv4.conf.all.forwarding
    - net.ipv6.conf.all.forwarding

- name: Install Docker SDK for Python (Ubuntu 24.04 compatible)
  apt:
    name:
      - python3-docker
    state: present
  ignore_errors: yes
