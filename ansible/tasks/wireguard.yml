---
# WireGuard Configuration Tasks
- name: Create WireGuard directory
  file:
    path: /etc/wireguard
    state: directory
    mode: '0700'

- name: Check if wg0.conf already exists (managed by wireguard-ui)
  stat:
    path: /etc/wireguard/wg0.conf
  register: wg0_conf_stat

- name: Generate WireGuard server private key (first deploy only)
  shell: wg genkey
  register: wg_private_key
  changed_when: false
  no_log: true
  when: not wg0_conf_stat.stat.exists

- name: Create WireGuard server configuration (first deploy only)
  copy:
    content: |
      [Interface]
      Address = 10.0.0.1/24
      ListenPort = {{ wireguard_port }}
      PrivateKey = {{ wg_private_key.stdout }}

      PostUp = iptables -I DOCKER-USER -i wg0 -j ACCEPT; iptables -I DOCKER-USER -o wg0 -j ACCEPT; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE; ip6tables -A FORWARD -i wg0 -j ACCEPT; ip6tables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
      PostDown = iptables -D DOCKER-USER -i wg0 -j ACCEPT; iptables -D DOCKER-USER -o wg0 -j ACCEPT; iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE; ip6tables -D FORWARD -i wg0 -j ACCEPT; ip6tables -t nat -D POSTROUTING -o eth0 -j MASQUERADE
    dest: /etc/wireguard/wg0.conf
    mode: '0600'
  no_log: true
  when: not wg0_conf_stat.stat.exists

- name: Deploy fix-allowed-ips script (wireguard-ui v0.6.x bug workaround)
  copy:
    dest: /etc/wireguard/fix-allowed-ips.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # wireguard-ui v0.6.x bug: generates wg0.conf with AllowedIPs=0.0.0.0/0
      # for ALL server peer entries (using client allowed_ips instead of
      # allocated_ips). WireGuard only permits one peer per prefix, so all but
      # the last peer get allowed ips: (none) and can't receive traffic.
      # This script re-applies each client's allocated_ips as the server-side
      # AllowedIPs so the kernel can route return traffic correctly.
      CLIENTS_DIR=/opt/services/wireguard-ui/clients
      for f in "$CLIENTS_DIR"/*.json; do
        pubkey=$(python3 -c "import json; d=json.load(open('$f')); print(d['public_key'])")
        allocated=$(python3 -c "import json; d=json.load(open('$f')); print(','.join(d['allocated_ips']))")
        /usr/bin/wg set wg0 peer "$pubkey" allowed-ips "$allocated" 2>/dev/null
      done

- name: Ensure wireguard-ui interfaces.json post_up calls fix-allowed-ips (idempotent)
  shell: |
    IFACE=/opt/services/wireguard-ui/server/interfaces.json
    if [ -f "$IFACE" ]; then
      python3 - "$IFACE" <<'PYEOF'
    import json, sys
    path = sys.argv[1]
    d = json.load(open(path))
    fix = "; /etc/wireguard/fix-allowed-ips.sh"
    if fix not in d.get("post_up", ""):
        d["post_up"] = d.get("post_up", "") + fix
        json.dump(d, open(path, "w"), indent=4)
        print("Updated post_up in interfaces.json")
    else:
        print("post_up already patched")
    PYEOF
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Ensure wg0.conf PostUp calls fix-allowed-ips (if conf already exists)
  shell: |
    WG_CONF=/etc/wireguard/wg0.conf
    if [ -f "$WG_CONF" ] && ! grep -q "fix-allowed-ips" "$WG_CONF"; then
      sed -i 's|^PostUp = .*|& ; /etc/wireguard/fix-allowed-ips.sh|' "$WG_CONF"
      echo "patched wg0.conf PostUp"
    else
      echo "already patched or conf not present"
    fi
  args:
    executable: /bin/bash
  changed_when: false

- name: Deploy idempotent NAT setup script
  copy:
    dest: /etc/wireguard/wg-nat.sh
    mode: '0755'
    content: |
      #!/bin/bash
      # Idempotently configure WireGuard NAT rules - safe to run multiple times
      # IPv4 FORWARD
      iptables -C FORWARD -i wg0 -j ACCEPT 2>/dev/null || iptables -A FORWARD -i wg0 -j ACCEPT
      iptables -C FORWARD -o wg0 -j ACCEPT 2>/dev/null || iptables -A FORWARD -o wg0 -j ACCEPT
      # IPv4 MASQUERADE
      iptables -t nat -C POSTROUTING -o eth0 -j MASQUERADE 2>/dev/null || iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
      # IPv6 FORWARD
      ip6tables -C FORWARD -i wg0 -j ACCEPT 2>/dev/null || ip6tables -A FORWARD -i wg0 -j ACCEPT
      # IPv6 MASQUERADE
      ip6tables -t nat -C POSTROUTING -o eth0 -j MASQUERADE 2>/dev/null || ip6tables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
      # Docker DOCKER-USER chain (only if Docker has created it)
      if iptables -L DOCKER-USER >/dev/null 2>&1; then
        iptables -C DOCKER-USER -i wg0 -j ACCEPT 2>/dev/null || iptables -I DOCKER-USER -i wg0 -j ACCEPT
        iptables -C DOCKER-USER -o wg0 -j ACCEPT 2>/dev/null || iptables -I DOCKER-USER -o wg0 -j ACCEPT
      fi

- name: Deploy wg-nat systemd service for persistent NAT on every boot
  copy:
    dest: /etc/systemd/system/wg-nat.service
    mode: '0644'
    content: |
      [Unit]
      Description=WireGuard NAT and forwarding rules
      After=network.target docker.service wg-quick@wg0.service
      Wants=docker.service wg-quick@wg0.service
      BindsTo=wg-quick@wg0.service

      [Service]
      Type=oneshot
      ExecStart=/etc/wireguard/wg-nat.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

- name: Deploy wg-syncconf service (triggered by path watcher)
  copy:
    dest: /etc/systemd/system/wg-syncconf.service
    mode: '0644'
    content: |
      [Unit]
      Description=Sync wg0.conf changes to WireGuard kernel
      After=wg-quick@wg0.service

      [Service]
      Type=oneshot
      ExecStart=/bin/bash -c 'wg syncconf wg0 <(wg-quick strip /etc/wireguard/wg0.conf)'

- name: Deploy wg-syncconf path watcher (auto-apply on wg0.conf change)
  copy:
    dest: /etc/systemd/system/wg-syncconf.path
    mode: '0644'
    content: |
      [Unit]
      Description=Watch wg0.conf for changes

      [Path]
      PathModified=/etc/wireguard/wg0.conf

      [Install]
      WantedBy=multi-user.target

- name: Enable and start WireGuard
  systemd:
    name: wg-quick@wg0
    state: started
    enabled: yes
    daemon_reload: yes

- name: Enable and start wg-nat service
  systemd:
    name: wg-nat
    state: started
    enabled: yes

- name: Enable wg-syncconf path watcher
  systemd:
    name: wg-syncconf.path
    state: started
    enabled: yes

- name: Apply NAT rules immediately
  shell: /etc/wireguard/wg-nat.sh
  changed_when: false

- name: Ensure wireguard-ui global_settings use correct DNS (never 10.0.0.1)
  shell: |
    SETTINGS="/opt/services/wireguard-ui/server/global_settings.json"
    echo "" \
      | base64 -d | python3 - "$SETTINGS" "{{ domain_name }}"
  args:
    executable: /bin/bash
  changed_when: false
