name: Deploy RouteMaker Only

on:
  push:
    branches:
      - main
    paths:
      - 'routemaker/**'
      - '.github/workflows/deploy-routemaker.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even without changes'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-server-ip:
    name: Get Server IP from Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        
      - name: Get Server IP
        id: terraform_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT
          echo "✅ Server IP retrieved: $SERVER_IP"

  deploy-routemaker:
    name: Deploy RouteMaker Application
    runs-on: ubuntu-latest
    needs: get-server-ip
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.get-server-ip.outputs.server_ip }} >> ~/.ssh/known_hosts
      
      - name: Sync RouteMaker files to server
        run: |
          echo "📦 Syncing RouteMaker application files..."
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='data/*.db' \
            --exclude='.git' \
            --exclude='.gitignore' \
            -e "ssh -i ~/.ssh/id_rsa" \
            routemaker/ root@${{ needs.get-server-ip.outputs.server_ip }}:/opt/services/routemaker/
          echo "✅ Files synced successfully"
      
      - name: Rebuild and restart RouteMaker container
        run: |
          echo "🔨 Rebuilding RouteMaker Docker image..."
          ssh -i ~/.ssh/id_rsa root@${{ needs.get-server-ip.outputs.server_ip }} << 'EOF'
            set -e
            cd /opt/services/routemaker
            
            # Ensure data directory has correct permissions
            chown -R 1000:1000 /opt/services/routemaker/data 2>/dev/null || true
            
            # Rebuild the image
            docker build -t routemaker:latest .
            
            # Stop and remove old container
            docker stop routemaker 2>/dev/null || true
            docker rm routemaker 2>/dev/null || true
            
            # Start new container (docker-compose will use the new image)
            cd /opt/services
            docker-compose up -d routemaker
            
            echo "✅ RouteMaker container restarted"
          EOF
      
      - name: Wait for container to be healthy
        run: |
          echo "⏳ Waiting for RouteMaker to be healthy..."
          ssh -i ~/.ssh/id_rsa root@${{ needs.get-server-ip.outputs.server_ip }} << 'EOF'
            for i in {1..30}; do
              if docker ps | grep -q "routemaker.*healthy\|routemaker.*Up"; then
                echo "✅ RouteMaker is healthy"
                exit 0
              fi
              echo "Waiting... ($i/30)"
              sleep 2
            done
            echo "❌ RouteMaker failed to become healthy"
            docker logs routemaker --tail 50
            exit 1
          EOF
      
      - name: Verify deployment
        run: |
          echo "🔍 Verifying RouteMaker deployment..."
          ssh -i ~/.ssh/id_rsa root@${{ needs.get-server-ip.outputs.server_ip }} << 'EOF'
            # Check container status
            if docker ps | grep -q routemaker; then
              echo "✅ Container is running"
            else
              echo "❌ Container is not running"
              exit 1
            fi
            
            # Check HTTP response
            if docker exec routemaker curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "✅ HTTP endpoint responding"
            else
              echo "❌ HTTP endpoint not responding"
              exit 1
            fi
            
            # Check Node.js version
            NODE_VERSION=$(docker exec routemaker node -v)
            echo "✅ Node.js version: $NODE_VERSION"
            
            # List users (verify database access)
            echo ""
            echo "Current users:"
            docker exec routemaker node manage-users.js list
          EOF
      
      - name: Display deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ RouteMaker Deployment Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🌐 Application URL: https://maker.${{ secrets.DOMAIN_NAME }}"
          echo "🔧 Manage users: docker exec -it routemaker node manage-users.js"
          echo "📊 View logs: docker logs -f routemaker"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
