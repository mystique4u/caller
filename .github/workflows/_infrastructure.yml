name: Infrastructure Deployment

on:
  workflow_call:
    inputs:
      terraform-action:
        required: true
        type: string
        description: 'Terraform action: plan or apply'
      terraform-version:
        required: false
        type: string
        default: '1.6.0'
      server-location:
        required: false
        type: string
        default: 'nbg1'
    secrets:
      TF_API_TOKEN:
        required: true
      HCLOUD_TOKEN:
        required: true
      FIREWALL_NAME:
        required: true
      SSH_KEY_IDS:
        required: true
      DOMAIN_NAME:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      EMAIL_ADDRESS:
        required: true
      JITSI_ADMIN_USER:
        required: false
      JITSI_ADMIN_PASSWORD:
        required: false
      MATRIX_ADMIN_USER:
        required: false
      MATRIX_ADMIN_PASSWORD:
        required: false
      MATRIX_REGISTRATION_SECRET:
        required: false
      MATRIX_POSTGRES_PASSWORD:
        required: false
      LIVEKIT_API_KEY:
        required: false
      LIVEKIT_API_SECRET:
        required: false
      TURN_SHARED_SECRET:
        required: false
    outputs:
      server-ip:
        description: 'Server IP address'
        value: ${{ jobs.terraform.outputs.server_ip }}

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_firewall_name: ${{ secrets.FIREWALL_NAME }}
  TF_VAR_ssh_key_ids: ${{ secrets.SSH_KEY_IDS }}
  TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
  TF_VAR_server_location: ${{ inputs.server-location }}

jobs:
  terraform:
    name: Terraform ${{ inputs.terraform-action }}
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.apply.outputs.public_ip }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-terraform
        with:
          terraform-version: ${{ inputs.terraform-version }}
          tf-api-token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Clean up stale Terraform state entries
        working-directory: ./terraform
        run: |
          terraform init -input=false
          # Remove stale DKIM record from state (resource removed from .tf files but still tracked in state)
          terraform state rm 'hcloud_zone_record.dkim[0]' 2>/dev/null || true

      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: |
          terraform plan -out=tfplan
          terraform show -no-color tfplan > plan.txt
      
      - name: Terraform Apply
        id: apply
        if: inputs.terraform-action == 'apply'
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve tfplan
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
      
      - name: Save Plan
        if: inputs.terraform-action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.txt
          retention-days: 5

  ansible:
    name: Configure Server
    runs-on: ubuntu-latest
    needs: terraform
    if: inputs.terraform-action == 'apply'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-ansible
        with:
          server-ip: ${{ needs.terraform.outputs.server_ip }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Wait for SSH
        run: |
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@${{ needs.terraform.outputs.server_ip }} 'echo ready'; then
              echo "SSH connection established"
              break
            fi
            echo "Waiting for SSH... attempt $i/30"
            sleep 10
          done
      
      - name: Run Ansible Playbook
        working-directory: ./ansible
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          JITSI_ADMIN_USER: ${{ secrets.JITSI_ADMIN_USER }}
          JITSI_ADMIN_PASSWORD: ${{ secrets.JITSI_ADMIN_PASSWORD }}
          MATRIX_ADMIN_USER: ${{ secrets.MATRIX_ADMIN_USER }}
          MATRIX_ADMIN_PASSWORD: ${{ secrets.MATRIX_ADMIN_PASSWORD }}
          MATRIX_REGISTRATION_SECRET: ${{ secrets.MATRIX_REGISTRATION_SECRET }}
          MATRIX_POSTGRES_PASSWORD: ${{ secrets.MATRIX_POSTGRES_PASSWORD }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          TURN_SHARED_SECRET: ${{ secrets.TURN_SHARED_SECRET }}
        run: |
          EXTRA_VARS=""
          [ -n "$JITSI_ADMIN_USER" ] && [ -n "$JITSI_ADMIN_PASSWORD" ] && \
            EXTRA_VARS="$EXTRA_VARS -e jitsi_admin_user=$JITSI_ADMIN_USER -e jitsi_admin_password=$JITSI_ADMIN_PASSWORD"
          [ -n "$MATRIX_ADMIN_USER" ] && [ -n "$MATRIX_ADMIN_PASSWORD" ] && \
            EXTRA_VARS="$EXTRA_VARS -e matrix_admin_user=$MATRIX_ADMIN_USER -e matrix_admin_password=$MATRIX_ADMIN_PASSWORD"
          
          ansible-playbook -i inventory.ini playbook.yml -v $EXTRA_VARS
      

      - name: Extract DKIM public key and send via email
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          SERVER_IP: ${{ needs.terraform.outputs.server_ip }}
        run: |
          echo "🔑 Extracting DKIM public key from mailserver..."
          sleep 5
          DKIM_RECORD=$(ssh -o StrictHostKeyChecking=no root@$SERVER_IP "docker exec mailserver cat /tmp/docker-mailserver/opendkim/keys/$DOMAIN_NAME/mail.txt 2>/dev/null || echo ''")
          if [ -z "$DKIM_RECORD" ]; then
            echo "⚠️  DKIM key not found yet (mailserver may still be starting)"
            exit 0
          fi
          echo "✅ DKIM key extracted successfully"
          echo "Raw DKIM record:" >> /tmp/dkim-key.txt
          echo "$DKIM_RECORD" >> /tmp/dkim-key.txt
          echo "" >> /tmp/dkim-key.txt
          echo "==========================================" >> /tmp/dkim-key.txt
          echo "DKIM Record:" >> /tmp/dkim-key.txt
          echo "==========================================" >> /tmp/dkim-key.txt
          echo "Host: mail._domainkey.$DOMAIN_NAME" >> /tmp/dkim-key.txt
          echo "Type: TXT" >> /tmp/dkim-key.txt
          echo "Value: $DKIM_RECORD" >> /tmp/dkim-key.txt
          echo "==========================================" >> /tmp/dkim-key.txt
          if [ -n "$EMAIL_ADDRESS" ]; then
            echo "📧 Sending DKIM key to $EMAIL_ADDRESS via deployed mailserver..."
            scp -o StrictHostKeyChecking=no /tmp/dkim-key.txt root@$SERVER_IP:/tmp/dkim-key.txt
            # Decode and run a Python SMTP sender on the server (base64-encoded to avoid YAML issues)
            SEND_SCRIPT=""
            ssh -o StrictHostKeyChecking=no root@$SERVER_IP \
              "echo '$SEND_SCRIPT' | base64 -d > /tmp/send-dkim-email.py; \
               command -v swaks &>/dev/null || apt-get install -y -qq swaks libnet-ssleay-perl 2>/dev/null || true; \
               if command -v swaks &>/dev/null; then \
                 swaks --to '$EMAIL_ADDRESS' --from 'noreply@$DOMAIN_NAME' --server localhost --port 25 \
                   --header 'Subject: DKIM Key for $DOMAIN_NAME' \
                   --body \"\$(cat /tmp/dkim-key.txt)\" 2>&1 \
                 && echo 'Email sent via swaks' \
                 || python3 /tmp/send-dkim-email.py '$EMAIL_ADDRESS' '$DOMAIN_NAME'; \
               else \
                 python3 /tmp/send-dkim-email.py '$EMAIL_ADDRESS' '$DOMAIN_NAME'; \
               fi" || echo "⚠️  Could not send DKIM email - key is in the workflow logs above"
            echo "✅ DKIM key email step completed"
          else
            echo "⚠️ EMAIL_ADDRESS not configured, DKIM key not sent via email"
          fi
