name: Infrastructure Deployment

on:
  workflow_call:
    inputs:
      terraform-action:
        required: true
        type: string
        description: 'Terraform action: plan or apply'
      terraform-version:
        required: false
        type: string
        default: '1.6.0'
      server-location:
        required: false
        type: string
        default: 'nbg1'
    secrets:
      TF_API_TOKEN:
        required: true
      HCLOUD_TOKEN:
        required: true
      FIREWALL_NAME:
        required: true
      SSH_KEY_IDS:
        required: true
      DOMAIN_NAME:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      EMAIL_ADDRESS:
        required: true
      JITSI_ADMIN_USER:
        required: false
      JITSI_ADMIN_PASSWORD:
        required: false
      MATRIX_ADMIN_USER:
        required: false
      MATRIX_ADMIN_PASSWORD:
        required: false
      MATRIX_REGISTRATION_SECRET:
        required: false
      MATRIX_POSTGRES_PASSWORD:
        required: false
      LIVEKIT_API_KEY:
        required: false
      LIVEKIT_API_SECRET:
        required: false
      TURN_SHARED_SECRET:
        required: false
    outputs:
      server-ip:
        description: 'Server IP address'
        value: ${{ jobs.terraform.outputs.server_ip }}

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_firewall_name: ${{ secrets.FIREWALL_NAME }}
  TF_VAR_ssh_key_ids: ${{ secrets.SSH_KEY_IDS }}
  TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
  TF_VAR_server_location: ${{ inputs.server-location }}

jobs:
  terraform:
    name: Terraform ${{ inputs.terraform-action }}
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.apply.outputs.public_ip }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-terraform
        with:
          terraform-version: ${{ inputs.terraform-version }}
          tf-api-token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: |
          terraform plan -out=tfplan
          terraform show -no-color tfplan > plan.txt
      
      - name: Terraform Apply
        id: apply
        if: inputs.terraform-action == 'apply'
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve tfplan
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
      
      - name: Save Plan
        if: inputs.terraform-action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.txt
          retention-days: 5

  ansible:
    name: Configure Server
    runs-on: ubuntu-latest
    needs: terraform
    if: inputs.terraform-action == 'apply'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-ansible
        with:
          server-ip: ${{ needs.terraform.outputs.server_ip }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Wait for SSH
        run: |
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@${{ needs.terraform.outputs.server_ip }} 'echo ready'; then
              echo "SSH connection established"
              break
            fi
            echo "Waiting for SSH... attempt $i/30"
            sleep 10
          done
      
      - name: Run Ansible Playbook
        working-directory: ./ansible
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          JITSI_ADMIN_USER: ${{ secrets.JITSI_ADMIN_USER }}
          JITSI_ADMIN_PASSWORD: ${{ secrets.JITSI_ADMIN_PASSWORD }}
          MATRIX_ADMIN_USER: ${{ secrets.MATRIX_ADMIN_USER }}
          MATRIX_ADMIN_PASSWORD: ${{ secrets.MATRIX_ADMIN_PASSWORD }}
          MATRIX_REGISTRATION_SECRET: ${{ secrets.MATRIX_REGISTRATION_SECRET }}
          MATRIX_POSTGRES_PASSWORD: ${{ secrets.MATRIX_POSTGRES_PASSWORD }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          TURN_SHARED_SECRET: ${{ secrets.TURN_SHARED_SECRET }}
        run: |
          EXTRA_VARS=""
          [ -n "$JITSI_ADMIN_USER" ] && [ -n "$JITSI_ADMIN_PASSWORD" ] && \
            EXTRA_VARS="$EXTRA_VARS -e jitsi_admin_user=$JITSI_ADMIN_USER -e jitsi_admin_password=$JITSI_ADMIN_PASSWORD"
          [ -n "$MATRIX_ADMIN_USER" ] && [ -n "$MATRIX_ADMIN_PASSWORD" ] && \
            EXTRA_VARS="$EXTRA_VARS -e matrix_admin_user=$MATRIX_ADMIN_USER -e matrix_admin_password=$MATRIX_ADMIN_PASSWORD"
          
          ansible-playbook -i inventory.ini playbook.yml -v $EXTRA_VARS
      
      - name: Extract and update DKIM DNS record
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          SERVER_IP: ${{ needs.terraform.outputs.server_ip }}
        run: |
          echo "🔑 Extracting DKIM public key from mailserver..."
          
          # Wait a bit for mailserver to fully start
          sleep 5
          
          # Extract DKIM record
          DKIM_RECORD=$(ssh -o StrictHostKeyChecking=no root@$SERVER_IP "
            docker exec mailserver cat /tmp/docker-mailserver/opendkim/keys/$DOMAIN_NAME/mail.txt 2>/dev/null || echo ''
          ")
          
          if [ -z "$DKIM_RECORD" ]; then
            echo "⚠️  DKIM key not found yet (mailserver may still be starting)"
            echo "💡 DKIM placeholder record created - will be updated on next deployment"
            exit 0
          fi
          
          echo "✅ DKIM key extracted successfully"
          
          echo "Raw DKIM record:"
          echo "$DKIM_RECORD"
          echo ""
          
          # Extract and clean the DKIM value properly
          # The record format is: mail._domainkey IN TXT ( "v=DKIM1; ..." "p=..." )
          # We need to extract everything between the parentheses, remove quotes and join
          DKIM_VALUE=$(echo "$DKIM_RECORD" | \
            sed -n '/v=DKIM1/,/)/p' | \
            tr -d '\n\t\r"()' | \
            sed 's/mail\._domainkey.*TXT//g' | \
            sed 's/IN//g' | \
            sed 's/[[:space:]]\+/ /g' | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          
          if [ -z "$DKIM_VALUE" ]; then
            echo "❌ Failed to parse DKIM value"
            echo "Raw record: $DKIM_RECORD"
            exit 0
          fi
          
          # Validate it starts with v=DKIM1
          if ! echo "$DKIM_VALUE" | grep -q "^v=DKIM1"; then
            echo "❌ Parsed value doesn't start with v=DKIM1"
            echo "Parsed: $DKIM_VALUE"
            exit 0
          fi
          
          echo "📝 DKIM value parsed successfully"
          echo "Length: ${#DKIM_VALUE} characters"
          echo "Preview: ${DKIM_VALUE:0:80}..."
          echo ""
          # Get zone ID
          echo "🌐 Getting DNS zone ID..."
          ZONE_RESPONSE=$(curl -s -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/zones?name=$DOMAIN_NAME")
          
          ZONE_ID=$(echo "$ZONE_RESPONSE" | jq -r '.zones[0].id // empty')
          
          if [ -z "$ZONE_ID" ]; then
            echo "❌ Could not find DNS zone for $DOMAIN_NAME"
            echo "Response: $ZONE_RESPONSE"
            exit 0
          fi
          
          echo "✅ Found zone ID: $ZONE_ID"
          
          # Get existing records to check if DKIM exists
          echo "🔍 Checking existing DKIM record..."
          EXISTING_RECORDS=$(curl -s -H "Authorization: Bearer $HCLOUD_TOKEN" \
            "https://api.hetzner.cloud/v1/zones/$ZONE_ID/records")
          
          # Validate API response
          if ! echo "$EXISTING_RECORDS" | jq -e '.records' > /dev/null 2>&1; then
            echo "❌ Invalid API response when fetching records"
            echo "Response: $EXISTING_RECORDS"
            exit 0
          fi
          
          echo "✅ Successfully fetched zone records"
          
          # Check if DKIM record exists
          DKIM_RECORD_ID=$(echo "$EXISTING_RECORDS" | jq -r '.records[] | select(.name == "mail._domainkey" and .type == "TXT") | .id // empty')
          
          if [ -n "$DKIM_RECORD_ID" ]; then
            echo "📝 Found existing DKIM record (ID: $DKIM_RECORD_ID), updating..."
            
            # Update existing record
            UPDATE_RESPONSE=$(curl -s -X PUT \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $HCLOUD_TOKEN" \
              -d "{\"name\":\"mail._domainkey\",\"type\":\"TXT\",\"value\":\"$DKIM_VALUE\",\"ttl\":3600,\"zone_id\":\"$ZONE_ID\"}" \
              "https://api.hetzner.cloud/v1/zones/$ZONE_ID/records/$DKIM_RECORD_ID")
          else
            echo "➕ Creating new DKIM record..."
            
            # Create new record
            UPDATE_RESPONSE=$(curl -s -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $HCLOUD_TOKEN" \
              -d "{\"name\":\"mail._domainkey\",\"type\":\"TXT\",\"value\":\"$DKIM_VALUE\",\"ttl\":3600,\"zone_id\":\"$ZONE_ID\"}" \
              "https://api.hetzner.cloud/v1/zones/$ZONE_ID/records")
          fi
          
          echo "API Response: $UPDATE_RESPONSE"
          
          if echo "$UPDATE_RESPONSE" | jq -e '.record' > /dev/null 2>&1; then
            echo "✅ DKIM DNS record updated successfully!"
            echo ""
            echo "=========================================="
            echo "DKIM Record Updated:"
            echo "=========================================="
            echo "Host: mail._domainkey.$DOMAIN_NAME"
            echo "Type: TXT"
            echo "Value: $DKIM_VALUE"
            echo "=========================================="
          else
            echo "⚠️  Failed to update DKIM record via API"
            echo "Response: $UPDATE_RESPONSE"
            echo ""
            echo "Manual fallback - Add this TXT record:"
            echo "Host: mail._domainkey"
            echo "Type: TXT"
            echo "Value: $DKIM_VALUE"
          fi
          
          # Save to server for reference
          ssh -o StrictHostKeyChecking=no root@$SERVER_IP \
            "echo '$DKIM_VALUE' > /opt/services/mailserver/dkim-public-key.txt"
          echo "📝 DKIM key saved to server: /opt/services/mailserver/dkim-public-key.txt"
