name: Infrastructure Deployment

on:
  workflow_call:
    inputs:
      terraform-action:
        required: true
        type: string
        description: 'Terraform action: plan or apply'
      terraform-version:
        required: false
        type: string
        default: '1.6.0'
      server-location:
        required: false
        type: string
        default: 'nbg1'
    secrets:
      TF_API_TOKEN:
        required: true
      HCLOUD_TOKEN:
        required: true
      FIREWALL_NAME:
        required: true
      SSH_KEY_IDS:
        required: true
      DOMAIN_NAME:
        required: true
      SSH_PRIVATE_KEY:
        required: true
      EMAIL_ADDRESS:
        required: true
      JITSI_ADMIN_USER:
        required: false
      JITSI_ADMIN_PASSWORD:
        required: false
      MATRIX_ADMIN_USER:
        required: false
      MATRIX_ADMIN_PASSWORD:
        required: false
      MATRIX_REGISTRATION_SECRET:
        required: false
      MATRIX_POSTGRES_PASSWORD:
        required: false
      LIVEKIT_API_KEY:
        required: false
      LIVEKIT_API_SECRET:
        required: false
      TURN_SHARED_SECRET:
        required: false
    outputs:
      server-ip:
        description: 'Server IP address'
        value: ${{ jobs.terraform.outputs.server_ip }}

env:
  TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
  TF_VAR_firewall_name: ${{ secrets.FIREWALL_NAME }}
  TF_VAR_ssh_key_ids: ${{ secrets.SSH_KEY_IDS }}
  TF_VAR_domain_name: ${{ secrets.DOMAIN_NAME }}
  TF_VAR_server_location: ${{ inputs.server-location }}

jobs:
  terraform:
    name: Terraform ${{ inputs.terraform-action }}
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.apply.outputs.public_ip }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-terraform
        with:
          terraform-version: ${{ inputs.terraform-version }}
          tf-api-token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: |
          terraform plan -out=tfplan
          terraform show -no-color tfplan > plan.txt
      
      - name: Terraform Apply
        id: apply
        if: inputs.terraform-action == 'apply'
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve tfplan
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
      
      - name: Save Plan
        if: inputs.terraform-action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan.txt
          retention-days: 5

  ansible:
    name: Configure Server
    runs-on: ubuntu-latest
    needs: terraform
    if: inputs.terraform-action == 'apply'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-ansible
        with:
          server-ip: ${{ needs.terraform.outputs.server_ip }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Wait for SSH
        run: |
          for i in {1..30}; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 root@${{ needs.terraform.outputs.server_ip }} 'echo ready'; then
              echo "SSH connection established"
              break
            fi
            echo "Waiting for SSH... attempt $i/30"
            sleep 10
          done
      
      - name: Run Ansible Playbook
        working-directory: ./ansible
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          JITSI_ADMIN_USER: ${{ secrets.JITSI_ADMIN_USER }}
          JITSI_ADMIN_PASSWORD: ${{ secrets.JITSI_ADMIN_PASSWORD }}
          MATRIX_ADMIN_USER: ${{ secrets.MATRIX_ADMIN_USER }}
          MATRIX_ADMIN_PASSWORD: ${{ secrets.MATRIX_ADMIN_PASSWORD }}
          MATRIX_REGISTRATION_SECRET: ${{ secrets.MATRIX_REGISTRATION_SECRET }}
          MATRIX_POSTGRES_PASSWORD: ${{ secrets.MATRIX_POSTGRES_PASSWORD }}
          LIVEKIT_API_KEY: ${{ secrets.LIVEKIT_API_KEY }}
          LIVEKIT_API_SECRET: ${{ secrets.LIVEKIT_API_SECRET }}
          TURN_SHARED_SECRET: ${{ secrets.TURN_SHARED_SECRET }}
        run: |
          EXTRA_VARS=""
          [ -n "$JITSI_ADMIN_USER" ] && [ -n "$JITSI_ADMIN_PASSWORD" ] && \
            EXTRA_VARS="$EXTRA_VARS -e jitsi_admin_user=$JITSI_ADMIN_USER -e jitsi_admin_password=$JITSI_ADMIN_PASSWORD"
          [ -n "$MATRIX_ADMIN_USER" ] && [ -n "$MATRIX_ADMIN_PASSWORD" ] && \
            EXTRA_VARS="$EXTRA_VARS -e matrix_admin_user=$MATRIX_ADMIN_USER -e matrix_admin_password=$MATRIX_ADMIN_PASSWORD"
          
          ansible-playbook -i inventory.ini playbook.yml -v $EXTRA_VARS
      
      - name: Extract DKIM public key
        id: dkim
        run: |
          echo "🔑 Extracting DKIM public key from mailserver..."
          DKIM_KEY=$(ssh -o StrictHostKeyChecking=no root@${{ needs.terraform.outputs.server_ip }} "
            docker exec mailserver cat /tmp/docker-mailserver/opendkim/keys/${{ secrets.DOMAIN_NAME }}/mail.txt 2>/dev/null | grep -o 'p=.*' | cut -d')' -f1
          " || echo "")
          
          if [ -n "$DKIM_KEY" ]; then
            echo "✅ DKIM key extracted successfully"
            echo "dkim_value=$DKIM_KEY" >> $GITHUB_OUTPUT
            echo "dkim_exists=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  DKIM key not found (mailserver may still be starting)"
            echo "dkim_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create DKIM DNS record via Hetzner API
        if: steps.dkim.outputs.dkim_exists == 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          echo "🌐 Creating DKIM DNS record..."
          
          # Get zone ID
          ZONE_ID=$(curl -s -H "Auth-API-Token: $HCLOUD_TOKEN" \
            "https://dns.hetzner.com/api/v1/zones?name=$DOMAIN_NAME" | \
            jq -r '.zones[0].id')
          
          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "null" ]; then
            echo "❌ Could not find DNS zone for $DOMAIN_NAME"
            exit 1
          fi
          
          echo "Found zone ID: $ZONE_ID"
          
          # Check if DKIM record already exists
          EXISTING_RECORD=$(curl -s -H "Auth-API-Token: $HCLOUD_TOKEN" \
            "https://dns.hetzner.com/api/v1/records?zone_id=$ZONE_ID" | \
            jq -r ".records[] | select(.name == \"mail._domainkey\" and .type == \"TXT\") | .id")
          
          DKIM_VALUE="v=DKIM1; k=rsa; ${{ steps.dkim.outputs.dkim_value }}"
          
          if [ -n "$EXISTING_RECORD" ] && [ "$EXISTING_RECORD" != "null" ]; then
            echo "📝 Updating existing DKIM record (ID: $EXISTING_RECORD)"
            curl -s -X PUT -H "Content-Type: application/json" \
              -H "Auth-API-Token: $HCLOUD_TOKEN" \
              -d "{\"value\":\"$DKIM_VALUE\",\"ttl\":3600,\"type\":\"TXT\",\"name\":\"mail._domainkey\",\"zone_id\":\"$ZONE_ID\"}" \
              "https://dns.hetzner.com/api/v1/records/$EXISTING_RECORD"
            echo "✅ DKIM DNS record updated"
          else
            echo "➕ Creating new DKIM record"
            curl -s -X POST -H "Content-Type: application/json" \
              -H "Auth-API-Token: $HCLOUD_TOKEN" \
              -d "{\"value\":\"$DKIM_VALUE\",\"ttl\":3600,\"type\":\"TXT\",\"name\":\"mail._domainkey\",\"zone_id\":\"$ZONE_ID\"}" \
              "https://dns.hetzner.com/api/v1/records"
            echo "✅ DKIM DNS record created"
          fi
          
          echo ""
          echo "DKIM TXT record:"
          echo "Host: mail._domainkey.$DOMAIN_NAME"
          echo "Value: $DKIM_VALUE"
