name: Validation Checks

on:
  workflow_call:
    inputs:
      terraform-version:
        required: false
        type: string
        default: '1.6.0'
    secrets:
      TF_API_TOKEN:
        required: true

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Check for secrets in code
        run: |
          set -e
          echo "🔍 Scanning for potential secrets..."
          if grep -r -i -E "(password|secret|api_key|token).*=.*['\"][^'\"]{8,}['\"]" \
            --exclude="*.example" --exclude="*.sample" --exclude="*.template" --exclude="README.md" \
            terraform/ ansible/ 2>/dev/null | grep -v "^[[:space:]]*#" | grep -v "lookup('env'" | \
            grep -v "lookup('password'" | grep -v "secrets\." ; then
            echo "::error::Found potential hardcoded secrets!"
            exit 1
          fi
          echo "✅ No hardcoded secrets detected"
      
      - name: Validate Ansible syntax
        run: |
          pip install ansible ansible-lint
          for playbook in ansible/*.yml; do
            [ -f "$playbook" ] && ansible-playbook --syntax-check "$playbook"
          done
          echo "✅ Ansible syntax valid"

  terraform-validate:
    name: Terraform Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - uses: ./.github/actions/setup-terraform
        with:
          terraform-version: ${{ inputs.terraform-version }}
          tf-api-token: ${{ secrets.TF_API_TOKEN }}
      
      - name: Terraform Format Check
        working-directory: ./terraform
        run: |
          echo "🔍 Checking Terraform formatting..."
          terraform fmt -check -recursive
          echo "✅ Terraform files are properly formatted"
      
      - name: Terraform Validate
        working-directory: ./terraform
        run: |
          echo "🔍 Validating Terraform configuration..."
          terraform validate -no-color
          echo "✅ Terraform configuration is valid"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Run Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
      
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
