name: Create Jitsi User

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username for the new Jitsi user (alphanumeric, dots, hyphens only)'
        required: true
        type: string
      password:
        description: 'Password for the new Jitsi user (min 8 characters)'
        required: true
        type: string

jobs:
  create-jitsi-user:
    name: Create Jitsi User
    runs-on: ubuntu-latest
    # Only allow repository owners/maintainers to trigger this workflow
    if: github.actor == 'mystique4u' || contains(github.actor, 'admin') || contains(github.actor, 'maintainer')

    steps:
      - name: Validate inputs
        run: |
          # Validate username format (alphanumeric, dots, hyphens only)
          if [[ ! "${{ github.event.inputs.username }}" =~ ^[a-zA-Z0-9.-]+$ ]]; then
            echo "❌ Invalid username format. Only alphanumeric characters, dots, and hyphens allowed."
            exit 1
          fi
          
          # Validate password length
          PASSWORD="${{ github.event.inputs.password }}"
          if [[ ${#PASSWORD} -lt 8 ]]; then
            echo "❌ Password must be at least 8 characters long."
            exit 1
          fi
          
          echo "✅ Input validation passed"

      - name: Create Jitsi User
        run: |
          echo "🔧 Creating Jitsi user: ${{ github.event.inputs.username }}"
          
          # Mask the password in logs
          echo "::add-mask::${{ github.event.inputs.password }}"
          
          # Export SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Create user
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} << 'EOF'
          docker exec jitsi-prosody prosodyctl \
            --config /config/prosody.cfg.lua \
            register "${{ github.event.inputs.username }}" auth.meet.jitsi "${{ github.event.inputs.password }}"
          echo "✅ Jitsi user created successfully: ${{ github.event.inputs.username }}@auth.meet.jitsi"
          EOF