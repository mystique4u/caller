name: Health Check & Notification

on:
  workflow_call:
    inputs:
      server-ip:
        required: true
        type: string
      send-email:
        required: false
        type: boolean
        default: true
    secrets:
      DOMAIN_NAME:
        required: true
      EMAIL_ADDRESS:
        required: false
      SSH_PRIVATE_KEY:
        required: true

jobs:
  health-check:
    name: Post-Deployment Health Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Wait for services
        run: |
          echo "⏳ Waiting 2 minutes for services to initialize..."
          sleep 120
      
      - name: Check DNS resolution
        run: |
          echo "🔍 Checking DNS resolution..."
          echo ""
          echo "=== Service DNS Records ==="
          dig +short "${{ secrets.DOMAIN_NAME }}" || echo "⚠️ DNS not resolved yet"
          dig +short "vpn.${{ secrets.DOMAIN_NAME }}" || echo "⚠️ VPN DNS not resolved yet"
          dig +short "meet.${{ secrets.DOMAIN_NAME }}" || echo "⚠️ Meet DNS not resolved yet"
          dig +short "mail.${{ secrets.DOMAIN_NAME }}" || echo "⚠️ Mail DNS not resolved yet"
          
          echo ""
          echo "=== Email Authentication DNS Records ==="
          
          # Check MX record
          echo "📧 MX Record:"
          MX_RECORD=$(dig +short MX "${{ secrets.DOMAIN_NAME }}")
          if [ -n "$MX_RECORD" ]; then
            echo "✅ $MX_RECORD"
          else
            echo "❌ No MX record found"
          fi
          
          # Check SPF record
          echo ""
          echo "🛡️ SPF Record:"
          SPF_RECORD=$(dig +short TXT "${{ secrets.DOMAIN_NAME }}" | grep "v=spf1")
          if [ -n "$SPF_RECORD" ]; then
            echo "✅ $SPF_RECORD"
          else
            echo "❌ No SPF record found"
          fi
          
          # Check DKIM record
          echo ""
          echo "🔑 DKIM Record:"
          DKIM_RECORD=$(dig +short TXT "mail._domainkey.${{ secrets.DOMAIN_NAME }}")
          if [ -n "$DKIM_RECORD" ]; then
            if echo "$DKIM_RECORD" | grep -q "PLACEHOLDER"; then
              echo "⚠️ DKIM record exists but contains placeholder (update in progress)"
            else
              echo "✅ DKIM record found: ${DKIM_RECORD:0:60}..."
            fi
          else
            echo "❌ No DKIM record found (may take a few minutes to propagate)"
          fi
          
          # Check DMARC record
          echo ""
          echo "📋 DMARC Record:"
          DMARC_RECORD=$(dig +short TXT "_dmarc.${{ secrets.DOMAIN_NAME }}")
          if [ -n "$DMARC_RECORD" ]; then
            echo "✅ $DMARC_RECORD"
          else
            echo "❌ No DMARC record found"
          fi
          
          echo ""
          echo "=== DNS Check Complete ==="
      
      - name: Check HTTPS services
        run: |
          echo "🔍 Checking HTTPS endpoints..."
          for subdomain in "" "vpn" "meet" "matrix" "chat" "maker"; do
            url="https://${subdomain:+$subdomain.}${{ secrets.DOMAIN_NAME }}"
            if curl -sSf -k --connect-timeout 10 "$url" > /dev/null 2>&1; then
              echo "✅ $url is accessible"
            else
              echo "::warning::$url is not responding yet"
            fi
          done
      
      - name: Health Check Summary
        run: |
          echo "## 🎉 Deployment Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Deployment completed" >> $GITHUB_STEP_SUMMARY
          echo "**Server IP:** ${{ inputs.server-ip }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Service URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **WireGuard VPN:** https://vpn.${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Jitsi Meet:** https://meet.${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Matrix Synapse:** https://matrix.${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Element Web:** https://chat.${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **RouteMaker:** https://maker.${{ secrets.DOMAIN_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SMTP Server:** mail.${{ secrets.DOMAIN_NAME }}:587" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📧 Email Authentication Status" >> $GITHUB_STEP_SUMMARY
          
          # Check MX
          if dig +short MX "${{ secrets.DOMAIN_NAME }}" | grep -q "."; then
            echo "- ✅ **MX Record:** Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **MX Record:** Not found" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check SPF
          if dig +short TXT "${{ secrets.DOMAIN_NAME }}" | grep -q "v=spf1"; then
            echo "- ✅ **SPF Record:** Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **SPF Record:** Not found" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check DKIM
          DKIM_CHECK=$(dig +short TXT "mail._domainkey.${{ secrets.DOMAIN_NAME }}")
          if [ -n "$DKIM_CHECK" ]; then
            if echo "$DKIM_CHECK" | grep -q "PLACEHOLDER"; then
              echo "- ⚠️ **DKIM Record:** Placeholder (update in progress)" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ **DKIM Record:** Configured" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- ❌ **DKIM Record:** Not found" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check DMARC
          if dig +short TXT "_dmarc.${{ secrets.DOMAIN_NAME }}" | grep -q "v=DMARC1"; then
            echo "- ✅ **DMARC Record:** Configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ **DMARC Record:** Not found" >> $GITHUB_STEP_SUMMARY
          fi

  send-notification:
    name: Send Deployment Report
    runs-on: ubuntu-latest
    needs: health-check
    if: inputs.send-email
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ inputs.server-ip }} >> ~/.ssh/known_hosts
      
      - name: Setup SMTP & Send Report
        run: |
          # Create noreply account and generate report
          ssh -o StrictHostKeyChecking=no root@${{ inputs.server-ip }} "
            set -e
            
            # Setup noreply email if mailserver is running
            NOREPLY_PASS=''
            if docker ps | grep mailserver > /dev/null; then
              echo '📧 Setting up noreply email account...'
              NOREPLY_PASS=\$(openssl rand -base64 24)
              docker exec mailserver setup email add 'noreply@${{ secrets.DOMAIN_NAME }}' \"\$NOREPLY_PASS\" 2>&1 || true
              docker exec mailserver setup config dkim 2>&1 || true
              echo 'NOREPLY_PASS='\$NOREPLY_PASS > /root/.noreply-credentials
              chmod 600 /root/.noreply-credentials
              echo '✅ Noreply account created'
            fi
            
            # Create deployment report
            cat > /tmp/deployment-report.txt <<'REPORT'
          Deployment completed successfully!
          
          Server: ${{ inputs.server-ip }}
          Domain: ${{ secrets.DOMAIN_NAME }}
          Time: $(date -u)
          
          Services:
          - WireGuard VPN: https://vpn.${{ secrets.DOMAIN_NAME }}
          - Jitsi Meet: https://meet.${{ secrets.DOMAIN_NAME }}
          - Matrix: https://matrix.${{ secrets.DOMAIN_NAME }}
          - Element: https://chat.${{ secrets.DOMAIN_NAME }}
          - RouteMaker: https://maker.${{ secrets.DOMAIN_NAME }}
          - SMTP: mail.${{ secrets.DOMAIN_NAME }}:587
          
          Next steps:
          1. Verify DNS propagation
          2. Generate DKIM keys: /opt/services/mailserver/generate-dkim.sh
          3. Add DKIM TXT record to DNS
          
          See docs/SMTP_GUIDE.md for details.
          REPORT
            
            echo '✅ Deployment report created'
            
            # Send email if configured
            if [ -n '${{ secrets.EMAIL_ADDRESS }}' ] && [ '${{ inputs.send-email }}' = 'true' ]; then
              echo '📧 Sending deployment report to ${{ secrets.EMAIL_ADDRESS }}...'
              
              # Send directly via mailserver container port (already exposed on host:25)
              FROM_EMAIL='noreply@${{ secrets.DOMAIN_NAME }}' \
              python3 /opt/services/mailserver/send-email.py \
                '${{ secrets.EMAIL_ADDRESS }}' \
                'Deployment Report - ${{ secrets.DOMAIN_NAME }}' \
                /tmp/deployment-report.txt
              
              if [ \$? -eq 0 ]; then
                echo '✅ Email sent successfully to ${{ secrets.EMAIL_ADDRESS }}'
              else
                echo '⚠️  Email sending failed, but deployment was successful'
                echo '⚠️  Debug: Check if mailserver is running: docker ps | grep mailserver'
                echo '⚠️  Debug: Check mailserver logs: docker logs mailserver'
              fi
            else
              echo '📧 Email notification skipped (EMAIL_ADDRESS not configured or send-email=false)'
            fi
          "
