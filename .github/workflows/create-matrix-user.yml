name: Create Matrix User

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username for the new Matrix user (alphanumeric, underscores, hyphens only)'
        required: true
        type: string
      password:
        description: 'Password for the new Matrix user (min 8 characters)'
        required: true
        type: string
      is_admin:
        description: 'Create as admin user'
        required: false
        default: false
        type: boolean

jobs:
  create-matrix-user:
    name: Create Matrix User
    runs-on: ubuntu-latest
    # Only allow repository owners/maintainers to trigger this workflow
    if: github.actor == 'mystique4u' || contains(github.actor, 'admin') || contains(github.actor, 'maintainer')

    steps:
      - name: Validate inputs
        run: |
          # Validate username format (alphanumeric, underscores, hyphens only)
          if [[ ! "${{ github.event.inputs.username }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid username format. Only alphanumeric characters, underscores, and hyphens allowed."
            exit 1
          fi
          
          # Validate password length
          PASSWORD="${{ github.event.inputs.password }}"
          if [[ ${#PASSWORD} -lt 8 ]]; then
            echo "❌ Password must be at least 8 characters long."
            exit 1
          fi
          
          echo "✅ Input validation passed"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Create Matrix User
        run: |
          echo "🔧 Creating Matrix user: ${{ github.event.inputs.username }}"
          if [ "${{ github.event.inputs.is_admin }}" = "true" ]; then
            ADMIN_FLAG="--admin"
            USER_TYPE="admin"
          else
            ADMIN_FLAG="--no-admin"
            USER_TYPE="regular"
          fi
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} "DOMAIN=${{ secrets.DOMAIN_NAME }} ADMIN_FLAG=$ADMIN_FLAG USER_TYPE=$USER_TYPE USERNAME=${{ github.event.inputs.username }} PASSWORD=${{ github.event.inputs.password }} bash -s" << 'EOF'
          # Additional server-side validation
          if [[ ! "$USERNAME" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Server validation failed: Invalid username format"
            exit 1
          fi
          
          docker exec matrix-synapse register_new_matrix_user \
            -u "$USERNAME" \
            -p "$PASSWORD" \
            $ADMIN_FLAG \
            -c /data/homeserver.yaml \
            http://localhost:8008
          
          if [[ $? -eq 0 ]]; then
            echo "✅ Matrix $USER_TYPE user created successfully: @$USERNAME@$DOMAIN"
          else
            echo "❌ Failed to create Matrix user"
            exit 1
          fi
          EOF