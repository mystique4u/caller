name: Create Matrix User

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username for the new Matrix user (alphanumeric, underscores, hyphens only)'
        required: true
        type: string
      password:
        description: 'Password for the new Matrix user (min 8 characters)'
        required: true
        type: string
      is_admin:
        description: 'Create as admin user'
        required: false
        default: false
        type: boolean

jobs:
  create-matrix-user:
    name: Create Matrix User
    runs-on: ubuntu-latest
    # Only allow repository owners/maintainers to trigger this workflow
    if: github.actor == 'mystique4u' || contains(github.actor, 'admin') || contains(github.actor, 'maintainer')

    steps:
      - name: Validate inputs
        run: |
          # Validate username format (alphanumeric, underscores, hyphens only)
          if [[ ! "${{ github.event.inputs.username }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid username format. Only alphanumeric characters, underscores, and hyphens allowed."
            exit 1
          fi
          
          # Validate password length
          PASSWORD="${{ github.event.inputs.password }}"
          if [[ ${#PASSWORD} -lt 8 ]]; then
            echo "❌ Password must be at least 8 characters long."
            exit 1
          fi
          
          echo "✅ Input validation passed"

      - name: Create Matrix User
        run: |
          echo "🔧 Creating Matrix user: ${{ github.event.inputs.username }}"
          
          # Mask the password in logs
          echo "::add-mask::${{ github.event.inputs.password }}"
          
          # Determine admin flag
          ADMIN_FLAG="--no-admin"
          USER_TYPE="regular"
          if [ "${{ github.event.inputs.is_admin }}" = "true" ]; then
            ADMIN_FLAG="--admin"
            USER_TYPE="admin"
          fi
          
          # Export SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Create user
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} << 'EOF'
          docker exec matrix-synapse register_new_matrix_user \
            -u "${{ github.event.inputs.username }}" \
            -p "${{ github.event.inputs.password }}" \
            $ADMIN_FLAG \
            -c /data/homeserver.yaml \
            http://localhost:8008
          echo "✅ Matrix $USER_TYPE user created successfully: @${{ github.event.inputs.username }}@${{ secrets.DOMAIN_NAME }}"
          EOF