name: Create User (Matrix + Jitsi + RouteMaker)

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username for the new user (alphanumeric, underscores, hyphens, dots only)'
        required: true
        type: string
      password:
        description: 'Password for the new user (min 8 characters)'
        required: true
        type: string
      is_admin:
        description: 'Create as Matrix admin user'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-server-ip:
    name: Get Server IP from Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          
      - name: Terraform Init
        working-directory: terraform
        run: terraform init
        
      - name: Get Server IP
        id: terraform_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT
          echo "✅ Server IP retrieved: $SERVER_IP"

  create-user:
    name: Create User for Matrix, Jitsi and RouteMaker
    runs-on: ubuntu-latest
    needs: get-server-ip
    # Only allow repository owners/maintainers to trigger this workflow
    if: github.actor == 'mystique4u' || contains(github.actor, 'admin') || contains(github.actor, 'maintainer')

    steps:
      - name: Validate inputs
        run: |
          # Mask sensitive data first
          echo "::add-mask::${{ github.event.inputs.username }}"
          echo "::add-mask::${{ github.event.inputs.password }}"
          
          # Validate username format (alphanumeric, underscores, hyphens, dots)
          if [[ ! "${{ github.event.inputs.username }}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "❌ Invalid username format. Only alphanumeric characters, underscores, hyphens, and dots allowed."
            exit 1
          fi
          
          # Validate password length
          PASSWORD="${{ github.event.inputs.password }}"
          if [[ ${#PASSWORD} -lt 8 ]]; then
            echo "❌ Password must be at least 8 characters long."
            exit 1
          fi
          
          echo "✅ Input validation passed"

      - name: Create Matrix User
        env:
          USERNAME: ${{ github.event.inputs.username }}
          PASSWORD: ${{ github.event.inputs.password }}
          IS_ADMIN: ${{ github.event.inputs.is_admin }}
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          echo "🔧 Creating Matrix user..."
          
          # Determine admin flag
          ADMIN_FLAG="--no-admin"
          USER_TYPE="regular"
          if [ "$IS_ADMIN" = "true" ]; then
            ADMIN_FLAG="--admin"
            USER_TYPE="admin"
          fi
          
          # Export SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Create Matrix user with error handling for existing users
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker exec matrix-synapse register_new_matrix_user \
              -u \"${USERNAME}\" \
              -p \"${PASSWORD}\" \
              ${ADMIN_FLAG} \
              -c /data/homeserver.yaml \
              http://localhost:8008 2>&1" && \
            echo "✅ Matrix ${USER_TYPE} user created: @${USERNAME}:${DOMAIN_NAME}" || \
            if echo "$?" | grep -q "User ID already taken"; then \
              echo "⏭️  Matrix user already exists: @${USERNAME}:${DOMAIN_NAME}"; \
            else \
              echo "⏭️  Matrix user creation skipped (may already exist): @${USERNAME}:${DOMAIN_NAME}"; \
            fi

      - name: Create Jitsi User
        env:
          USERNAME: ${{ github.event.inputs.username }}
          PASSWORD: ${{ github.event.inputs.password }}
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "🔧 Creating Jitsi user..."
          
          # Create Jitsi user with error handling for existing users
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker exec jitsi-prosody prosodyctl \
              --config /config/prosody.cfg.lua \
              register \"${USERNAME}\" auth.meet.jitsi \"${PASSWORD}\" 2>&1" && \
            echo "✅ Jitsi user created: ${USERNAME}@auth.meet.jitsi" || \
            echo "⏭️  Jitsi user creation skipped (may already exist): ${USERNAME}@auth.meet.jitsi"

      - name: Create RouteMaker User
        env:
          USERNAME: ${{ github.event.inputs.username }}
          PASSWORD: ${{ github.event.inputs.password }}
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "🔧 Creating RouteMaker user..."
          
          # Create RouteMaker user with --skip-if-exists flag
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "cd /opt/services/routemaker && \
            docker exec routemaker node manage-users.js create \"${USERNAME}\" \"${PASSWORD}\" --skip-if-exists"

      - name: Summary
        env:
          USERNAME: ${{ github.event.inputs.username }}
          IS_ADMIN: ${{ github.event.inputs.is_admin }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ User Creation Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📝 User Details:"
          echo "  Username: [HIDDEN]"
          echo ""
          echo "🔐 Matrix Account:"
          echo "  Full ID: @[HIDDEN]:${DOMAIN_NAME}"
          echo "  Login URL: https://chat.${DOMAIN_NAME}"
          if [ "$IS_ADMIN" = "true" ]; then
            echo "  Admin: Yes ✅"
          else
            echo "  Admin: No"
          fi
          echo ""
          echo "📹 Jitsi Account:"
          echo "  Full ID: [HIDDEN]@auth.meet.jitsi"
          echo "  Meeting URL: https://meet.${DOMAIN_NAME}"
          echo ""
          echo "🗺️  RouteMaker Account:"
          echo "  Username: [HIDDEN]"
          echo "  App URL: https://maker.${DOMAIN_NAME}"
          echo "  Color: Random (assigned automatically)"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📧 Credentials have been created and should be"
          echo "   shared with the user via a secure channel."
          echo "  Matrix: https://chat.${DOMAIN_NAME}"
          echo "  Jitsi: https://meet.${DOMAIN_NAME}"
          echo "  RouteMaker: https://maker.${DOMAIN_NAME}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
