name: Create User (Matrix + Jitsi)

on:
  workflow_dispatch:
    inputs:
      username:
        description: 'Username for the new user (alphanumeric, underscores, hyphens, dots only)'
        required: true
        type: string
      password:
        description: 'Password for the new user (min 8 characters)'
        required: true
        type: string
      is_admin:
        description: 'Create as Matrix admin user'
        required: false
        default: false
        type: boolean

jobs:
  create-user:
    name: Create User for Matrix and Jitsi
    runs-on: ubuntu-latest
    # Only allow repository owners/maintainers to trigger this workflow
    if: github.actor == 'mystique4u' || contains(github.actor, 'admin') || contains(github.actor, 'maintainer')

    steps:
      - name: Validate inputs
        run: |
          # Mask sensitive data first
          echo "::add-mask::${{ github.event.inputs.username }}"
          echo "::add-mask::${{ github.event.inputs.password }}"
          
          # Validate username format (alphanumeric, underscores, hyphens, dots)
          if [[ ! "${{ github.event.inputs.username }}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "❌ Invalid username format. Only alphanumeric characters, underscores, hyphens, and dots allowed."
            exit 1
          fi
          
          # Validate password length
          PASSWORD="${{ github.event.inputs.password }}"
          if [[ ${#PASSWORD} -lt 8 ]]; then
            echo "❌ Password must be at least 8 characters long."
            exit 1
          fi
          
          echo "✅ Input validation passed"

      - name: Create Matrix User
        env:
          USERNAME: ${{ github.event.inputs.username }}
          PASSWORD: ${{ github.event.inputs.password }}
          IS_ADMIN: ${{ github.event.inputs.is_admin }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          echo "🔧 Creating Matrix user..."
          
          # Determine admin flag
          ADMIN_FLAG="--no-admin"
          USER_TYPE="regular"
          if [ "$IS_ADMIN" = "true" ]; then
            ADMIN_FLAG="--admin"
            USER_TYPE="admin"
          fi
          
          # Verify SERVER_IP is set
          if [ -z "$SERVER_IP" ]; then
            echo "❌ ERROR: SERVER_IP secret is not set in GitHub repository settings"
            exit 1
          fi
          
          # Export SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Create Matrix user
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'ENDSSH'
          docker exec matrix-synapse register_new_matrix_user \
            -u "${USERNAME}" \
            -p "${PASSWORD}" \
            ${ADMIN_FLAG} \
            -c /data/homeserver.yaml \
            http://localhost:8008
          echo "✅ Matrix ${USER_TYPE} user created successfully: @${USERNAME}:${DOMAIN_NAME}"
          ENDSSH

      - name: Create Jitsi User
        env:
          USERNAME: ${{ github.event.inputs.username }}
          PASSWORD: ${{ github.event.inputs.password }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: |
          echo "🔧 Creating Jitsi user..."
          
          # Create Jitsi user
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'ENDSSH'
          docker exec jitsi-prosody prosodyctl \
            --config /config/prosody.cfg.lua \
            register "${USERNAME}" auth.meet.jitsi "${PASSWORD}"
          echo "✅ Jitsi user created successfully: ${USERNAME}@auth.meet.jitsi"
          ENDSSH

      - name: Summary
        env:
          USERNAME: ${{ github.event.inputs.username }}
          IS_ADMIN: ${{ github.event.inputs.is_admin }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ User Creation Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📝 User Details:"
          echo "  Username: [HIDDEN]"
          echo ""
          echo "🔐 Matrix Account:"
          echo "  Full ID: @[HIDDEN]:${DOMAIN_NAME}"
          echo "  Login URL: https://chat.${DOMAIN_NAME}"
          if [ "$IS_ADMIN" = "true" ]; then
            echo "  Admin: Yes ✅"
          else
            echo "  Admin: No"
          fi
          echo ""
          echo "📹 Jitsi Account:"
          echo "  Full ID: [HIDDEN]@auth.meet.jitsi"
          echo "  Meeting URL: https://meet.${DOMAIN_NAME}"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📧 Credentials have been created and should be"
          echo "   shared with the user via a secure channel."
          echo "  Matrix: https://chat.${DOMAIN_NAME}"
          echo "  Jitsi: https://meet.${DOMAIN_NAME}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
