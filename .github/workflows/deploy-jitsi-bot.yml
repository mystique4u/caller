name: Deploy Jitsi Matrix Bot

on:
  push:
    branches:
      - main
    paths:
      - 'bots/jitsi-bot/**'
      - 'ansible/tasks/bot-jitsi.yml'
      - 'ansible/tasks/services.yml'
      - '.github/workflows/deploy-jitsi-bot.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even without changes'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BOT_USERNAME: jitsi-bot

# Required GitHub Secrets (no bot-specific secrets needed):
#   SSH_PRIVATE_KEY  — server SSH key
#   TF_API_TOKEN     — Terraform Cloud token
#   DOMAIN_NAME      — your domain (e.g. example.com)
#   EMAIL_ADDRESS    — destination for post-deploy email
#
# Bot password and webhook secret are auto-generated on first deploy and
# stored in /opt/services/bots/jitsi-bot/.credentials on the server.
# The bot creates its own Matrix room on startup and persists the room ID
# to /opt/services/bots/jitsi-bot/data/room_id.txt.

jobs:
  get-server-ip:
    name: Get Server IP from Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Get Server IP
        id: terraform_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT
          echo "✅ Server IP: $SERVER_IP"

  deploy-bot:
    name: Deploy Jitsi Matrix Bot
    runs-on: ubuntu-latest
    needs: get-server-ip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH key
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${SERVER_IP} >> ~/.ssh/known_hosts

      - name: Validate required secrets
        env:
          DOMAIN_NAME:   ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          MISSING=()
          [[ -z "$DOMAIN_NAME" ]]   && MISSING+=("DOMAIN_NAME")
          [[ -z "$EMAIL_ADDRESS" ]] && MISSING+=("EMAIL_ADDRESS")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Missing required GitHub Secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Create bot data directory on server
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "mkdir -p /opt/services/bots/jitsi-bot/data && chmod 700 /opt/services/bots/jitsi-bot/data"

      - name: Generate or load bot credentials (idempotent)
        id: creds
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          CREDS_FILE=/opt/services/bots/jitsi-bot/.credentials
          EXISTING=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "cat ${CREDS_FILE} 2>/dev/null || true")

          NEW_CREDS=false
          if [[ -n "$EXISTING" ]]; then
            echo "🔑 Loading existing credentials from server"
            BOT_PASSWORD=$(echo "$EXISTING" | grep '^BOT_PASSWORD=' | cut -d= -f2-)
            WEBHOOK_SECRET=$(echo "$EXISTING" | grep '^WEBHOOK_SECRET=' | cut -d= -f2-)
            MATRIX_ROOM_ID=$(echo "$EXISTING" | grep '^MATRIX_ROOM_ID=' | cut -d= -f2-)
          else
            echo "🔑 Generating new credentials"
            NEW_CREDS=true
            BOT_PASSWORD=$(openssl rand -base64 32 | tr -d '=+/\n' | head -c 32)
            WEBHOOK_SECRET=$(openssl rand -hex 32)
            # Try to recover room ID from persisted data volume as fallback
            MATRIX_ROOM_ID=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
              "cat /opt/services/bots/jitsi-bot/data/room_id.txt 2>/dev/null | grep '^!' || true")
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} bash << SSHEOF
          printf 'BOT_PASSWORD=%s\nWEBHOOK_SECRET=%s\nMATRIX_ROOM_ID=%s\n' "${BOT_PASSWORD}" "${WEBHOOK_SECRET}" "${MATRIX_ROOM_ID}" \
            > ${CREDS_FILE}
          chmod 600 ${CREDS_FILE}
          SSHEOF
          fi
          echo "new_creds=${NEW_CREDS}" >> $GITHUB_OUTPUT

          echo "::add-mask::${BOT_PASSWORD}"
          echo "::add-mask::${WEBHOOK_SECRET}"
          echo "bot_password=${BOT_PASSWORD}" >> $GITHUB_OUTPUT
          echo "webhook_secret=${WEBHOOK_SECRET}" >> $GITHUB_OUTPUT
          echo "matrix_room_id=${MATRIX_ROOM_ID}" >> $GITHUB_OUTPUT

      - name: Sync bot files to server
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "📦 Syncing jitsi-bot files to server..."
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.credentials' \
            --exclude='data/' \
            bots/jitsi-bot/ root@${SERVER_IP}:/opt/services/bots/jitsi-bot/

      - name: Copy Prosody plugin
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "mkdir -p /opt/services/jitsi/prosody/prosody-plugins-custom && \
             cp /opt/services/bots/jitsi-bot/prosody-plugin/mod_matrix_webhook.lua \
                /opt/services/jitsi/prosody/prosody-plugins-custom/"

      - name: Register Matrix bot user (idempotent)
        env:
          SERVER_IP:    ${{ needs.get-server-ip.outputs.server_ip }}
          BOT_PASSWORD: ${{ steps.creds.outputs.bot_password }}
          NEW_CREDS:    ${{ steps.creds.outputs.new_creds }}
        run: |
          echo "Registering Matrix user: ${BOT_USERNAME}"
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker exec matrix-synapse register_new_matrix_user \
               -u ${BOT_USERNAME} -p '${BOT_PASSWORD}' \
               --no-admin -c /data/homeserver.yaml http://localhost:8008 2>&1" || true)
          if echo "$RESULT" | grep -q 'User ID already taken'; then
            if [[ "${NEW_CREDS}" == "true" ]]; then
              echo "🔄 User exists but credentials were regenerated — updating DB password"
              ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
                "ADMIN_TOKEN=\$(docker exec matrix-postgres psql -U synapse synapse -tAc \"SELECT token FROM access_tokens WHERE user_id IN (SELECT name FROM users WHERE admin=1) ORDER BY id DESC LIMIT 1;\") && docker exec matrix-synapse wget -q -O/dev/null --method=PUT --header=Content-Type:application/json --header=\"Authorization: Bearer \$ADMIN_TOKEN\" --body-data=\"{\\\"password\\\":\\\"${BOT_PASSWORD}\\\"}\" http://localhost:8008/_synapse/admin/v2/users/%40${BOT_USERNAME}%3A${MATRIX_DOMAIN} && echo OK"
            fi
          fi

      - name: Write docker-compose override for jitsi-bot
        env:
          SERVER_IP:       ${{ needs.get-server-ip.outputs.server_ip }}
          DOMAIN_NAME:     ${{ secrets.DOMAIN_NAME }}
          BOT_PASSWORD:    ${{ steps.creds.outputs.bot_password }}
          WEBHOOK_SECRET:  ${{ steps.creds.outputs.webhook_secret }}
          MATRIX_ROOM_ID:  ${{ steps.creds.outputs.matrix_room_id }}
        run: |
          cat > /tmp/docker-compose.jitsi-bot.yml << YAML
          services:
            jitsi-bot:
              build:
                context: /opt/services/bots/jitsi-bot
                dockerfile: Dockerfile
              image: jitsi-bot:latest
              container_name: jitsi-bot
              restart: unless-stopped
              environment:
                - BOT_USERNAME=${BOT_USERNAME}
                - BOT_PASSWORD=${BOT_PASSWORD}
                - MATRIX_DOMAIN=${DOMAIN_NAME}
                - MATRIX_INTERNAL_URL=http://matrix-synapse:8008
                - JITSI_PUBLIC_URL=https://meet.${DOMAIN_NAME}
                - WEBHOOK_SECRET=${WEBHOOK_SECRET}
                - MATRIX_ROOM_ID=${MATRIX_ROOM_ID}
              volumes:
                - /opt/services/bots/jitsi-bot/data:/data
              networks:
                - services_network
          networks:
            services_network:
              external: true
          YAML
          sed -i 's/^          //' /tmp/docker-compose.jitsi-bot.yml
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            /tmp/docker-compose.jitsi-bot.yml \
            root@${SERVER_IP}:/opt/services/docker-compose.jitsi-bot.yml

      - name: Build and start jitsi-bot container
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            set -e
            cd /opt/services
            echo "Building jitsi-bot image..."
            docker build -t jitsi-bot:latest /opt/services/bots/jitsi-bot/ || {
              echo "❌ Docker build failed"; exit 1;
            }
            echo "Starting jitsi-bot container..."
            docker rm -f jitsi-bot 2>/dev/null || true
            docker compose -p jitsi-bot -f docker-compose.jitsi-bot.yml up -d jitsi-bot
            echo "✅ Container started"
          EOF

      - name: Migrate away from legacy path (idempotent)
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            if [[ -d /opt/services/jitsi-bot ]]; then
              echo "🧹 Removing legacy /opt/services/jitsi-bot/ ..."
              rm -rf /opt/services/jitsi-bot
            fi
          EOF

      - name: Ensure Prosody has webhook env vars and Lua plugin
        env:
          SERVER_IP:      ${{ needs.get-server-ip.outputs.server_ip }}
          WEBHOOK_SECRET: ${{ steps.creds.outputs.webhook_secret }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << ENVSSH
            set -e
            COMPOSE=/opt/services/docker-compose.yml

            if ! grep -q "XMPP_MUC_MODULES=matrix_webhook" "\$COMPOSE"; then
              echo "Adding webhook env vars to docker-compose.yml..."
              sed -i "/- ENABLE_AUTH=1/a\\      - XMPP_MUC_MODULES=matrix_webhook\\n      - MATRIX_WEBHOOK_URL=http://jitsi-bot:3001/webhook\\n      - MATRIX_WEBHOOK_SECRET=${WEBHOOK_SECRET}" "\$COMPOSE"
            else
              sed -i "s|MATRIX_WEBHOOK_SECRET=.*|MATRIX_WEBHOOK_SECRET=${WEBHOOK_SECRET}|g" "\$COMPOSE"
            fi

            if ! grep -q "PROSODY_TRUSTED_PROXIES" "\$COMPOSE"; then
              sed -i "/MATRIX_WEBHOOK_SECRET/a\\      - PROSODY_TRUSTED_PROXIES=127.0.0.1,::1,172.16.0.0\/12,10.0.0.0\/8" "\$COMPOSE"
            fi

            cp /opt/services/bots/jitsi-bot/prosody-plugin/mod_matrix_webhook.lua \
               /opt/services/jitsi/prosody/prosody-plugins-custom/
            cd /opt/services && docker compose up -d jitsi-prosody
            echo "✅ Prosody restarted with webhook module"
          ENVSSH

      - name: Health check
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          sleep 8
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            'STATUS=$(docker inspect --format "{{.State.Status}}" jitsi-bot 2>/dev/null); \
             [[ "$STATUS" == "running" ]] && echo "✅ jitsi-bot is running" || (echo "❌ jitsi-bot status: $STATUS"; exit 1)'
