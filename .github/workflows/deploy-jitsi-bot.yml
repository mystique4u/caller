name: Deploy Jitsi Matrix Bot

on:
  push:
    branches:
      - main
      - feature/jitsi-matrix-bot
    paths:
      - 'bots/jitsi-bot/**'
      - 'ansible/tasks/bot-jitsi.yml'
      - 'ansible/tasks/services.yml'
      - '.github/workflows/deploy-jitsi-bot.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even without changes'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  get-server-ip:
    name: Get Server IP from Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Get Server IP
        id: terraform_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT
          echo "✅ Server IP: $SERVER_IP"

  deploy-bot:
    name: Deploy Jitsi Matrix Bot
    runs-on: ubuntu-latest
    needs: get-server-ip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH key
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${SERVER_IP} >> ~/.ssh/known_hosts

      - name: Validate required secrets
        env:
          MATRIX_BOT_PASSWORD:   ${{ secrets.MATRIX_BOT_PASSWORD }}
          MATRIX_WEBHOOK_SECRET: ${{ secrets.MATRIX_WEBHOOK_SECRET }}
          MATRIX_BOT_ROOM:       ${{ secrets.MATRIX_BOT_ROOM }}
          DOMAIN_NAME:           ${{ secrets.DOMAIN_NAME }}
        run: |
          MISSING=()
          [[ -z "$MATRIX_BOT_PASSWORD" ]]   && MISSING+=("MATRIX_BOT_PASSWORD")
          [[ -z "$MATRIX_WEBHOOK_SECRET" ]] && MISSING+=("MATRIX_WEBHOOK_SECRET")
          [[ -z "$MATRIX_BOT_ROOM" ]]       && MISSING+=("MATRIX_BOT_ROOM")
          [[ -z "$DOMAIN_NAME" ]]           && MISSING+=("DOMAIN_NAME")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Missing required GitHub Secrets: ${MISSING[*]}"
            echo "   Add them at: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Sync bot files to server
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "📦 Syncing jitsi-bot files to server..."
          rsync -avz --delete \
            --exclude='.git' \
            bots/jitsi-bot/ root@${SERVER_IP}:/opt/services/bots/jitsi-bot/

      - name: Copy Prosody plugin
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "mkdir -p /opt/services/jitsi/prosody/prosody-plugins-custom && \
             cp /opt/services/bots/jitsi-bot/prosody-plugin/mod_matrix_webhook.lua \
                /opt/services/jitsi/prosody/prosody-plugins-custom/"

      - name: Write docker-compose override for jitsi-bot
        env:
          SERVER_IP:             ${{ needs.get-server-ip.outputs.server_ip }}
          DOMAIN_NAME:           ${{ secrets.DOMAIN_NAME }}
          MATRIX_BOT_USER:       ${{ secrets.MATRIX_BOT_USER }}
          MATRIX_BOT_PASSWORD:   ${{ secrets.MATRIX_BOT_PASSWORD }}
          MATRIX_WEBHOOK_SECRET: ${{ secrets.MATRIX_WEBHOOK_SECRET }}
          MATRIX_BOT_ROOM:       ${{ secrets.MATRIX_BOT_ROOM }}
        run: |
          # Render the override file locally then copy it — avoids shell escaping
          # issues with secrets in heredocs over SSH.
          BOT_USER="${MATRIX_BOT_USER:-jitsi-bot}"
          cat > /tmp/docker-compose.jitsi-bot.yml << YAML
          services:
            jitsi-bot:
              build:
                context: /opt/services/bots/jitsi-bot
                dockerfile: Dockerfile
              image: jitsi-bot:latest
              container_name: jitsi-bot
              restart: unless-stopped
              environment:
                - BOT_USERNAME=${BOT_USER}
                - BOT_PASSWORD=${MATRIX_BOT_PASSWORD}
                - MATRIX_DOMAIN=${DOMAIN_NAME}
                - MATRIX_INTERNAL_URL=http://matrix-synapse:8008
                - JITSI_PUBLIC_URL=https://meet.${DOMAIN_NAME}
                - WEBHOOK_SECRET=${MATRIX_WEBHOOK_SECRET}
                - MATRIX_ROOM=${MATRIX_BOT_ROOM}
              networks:
                - services_network
          networks:
            services_network:
              external: true
          YAML
          # Strip leading indentation (heredoc artifact)
          sed -i 's/^          //' /tmp/docker-compose.jitsi-bot.yml
          echo "--- Rendered override ---"
          cat /tmp/docker-compose.jitsi-bot.yml
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            /tmp/docker-compose.jitsi-bot.yml \
            root@${SERVER_IP}:/opt/services/docker-compose.jitsi-bot.yml

      - name: Register Matrix bot user (idempotent)
        env:
          SERVER_IP:           ${{ needs.get-server-ip.outputs.server_ip }}
          MATRIX_BOT_USER:     ${{ secrets.MATRIX_BOT_USER }}
          MATRIX_BOT_PASSWORD: ${{ secrets.MATRIX_BOT_PASSWORD }}
        run: |
          BOT_USER="${MATRIX_BOT_USER:-jitsi-bot}"
          echo "Registering Matrix user: ${BOT_USER}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker exec matrix-synapse register_new_matrix_user \
               -u ${BOT_USER} -p '${MATRIX_BOT_PASSWORD}' \
               --no-admin -c /data/homeserver.yaml http://localhost:8008 2>&1 \
             | grep -v 'User ID already taken' || true"

      - name: Build and start jitsi-bot container
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            set -e
            cd /opt/services
            echo "Building jitsi-bot image..."
            docker build -t jitsi-bot:latest /opt/services/bots/jitsi-bot/ || {
              echo "❌ Docker build failed"; exit 1;
            }
            echo "Starting jitsi-bot container..."
            docker rm -f jitsi-bot 2>/dev/null || true
            docker compose -f docker-compose.jitsi-bot.yml up -d jitsi-bot
            echo "✅ Container started"
          EOF

      - name: Ensure Prosody has webhook env vars and Lua plugin
        env:
          SERVER_IP:             ${{ needs.get-server-ip.outputs.server_ip }}
          MATRIX_WEBHOOK_SECRET: ${{ secrets.MATRIX_WEBHOOK_SECRET }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << ENVSSH
            set -e
            COMPOSE=/opt/services/docker-compose.yml

            # Idempotently add XMPP_MUC_MODULES to docker-compose.yml if missing
            if ! grep -q "XMPP_MUC_MODULES=matrix_webhook" "\$COMPOSE"; then
              echo "Adding webhook env vars to docker-compose.yml..."
              sed -i "/- ENABLE_AUTH=1/a\\      - XMPP_MUC_MODULES=matrix_webhook\\n      - MATRIX_WEBHOOK_URL=http://jitsi-bot:3001/webhook\\n      - MATRIX_WEBHOOK_SECRET=${MATRIX_WEBHOOK_SECRET}" "\$COMPOSE"
            else
              echo "Prosody env vars already present — updating secret value ✅"
              # Always overwrite the secret value in case it was blank or changed
              sed -i "s|MATRIX_WEBHOOK_SECRET=.*|MATRIX_WEBHOOK_SECRET=${MATRIX_WEBHOOK_SECRET}|g" "\$COMPOSE"
            fi

            # Idempotently add PROSODY_TRUSTED_PROXIES so Prosody uses real client IPs
            if ! grep -q "PROSODY_TRUSTED_PROXIES" "\$COMPOSE"; then
              echo "Adding PROSODY_TRUSTED_PROXIES..."
              sed -i "/MATRIX_WEBHOOK_SECRET/a\\      - PROSODY_TRUSTED_PROXIES=127.0.0.1,::1,172.16.0.0\/12,10.0.0.0\/8" "\$COMPOSE"
            else
              echo "PROSODY_TRUSTED_PROXIES already present ✅"
            fi

            # Ensure plugin file is in place
            cp /opt/services/bots/jitsi-bot/prosody-plugin/mod_matrix_webhook.lua \
               /opt/services/jitsi/prosody/prosody-plugins-custom/

            # Recreate jitsi-prosody to pick up env + plugin
            cd /opt/services
            docker compose up -d --force-recreate jitsi-prosody
            echo "✅ Prosody restarted with webhook module"
          ENVSSH

      - name: Patch jitsi-web nginx to forward real client IPs
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            if docker exec jitsi-web grep -q 'X-Forwarded-For \$remote_addr' /config/nginx/meet.conf 2>/dev/null; then
              docker exec jitsi-web sed -i \
                's/proxy_set_header X-Forwarded-For \$remote_addr/proxy_set_header X-Forwarded-For \$http_x_forwarded_for/g' \
                /config/nginx/meet.conf
              docker exec jitsi-web nginx -s reload
              echo "✅ nginx patched and reloaded"
            else
              echo "✅ nginx already patched (or not running)"
            fi
          EOF

      - name: Wait for bot to start
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "⏳ Waiting for jitsi-bot to come up..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            for i in $(seq 1 20); do
              if docker ps | grep -q "jitsi-bot.*Up"; then
                echo "✅ jitsi-bot is running"
                exit 0
              fi
              echo "Waiting... ($i/20)"
              sleep 3
            done
            echo "❌ jitsi-bot did not start in time"
            docker logs jitsi-bot --tail 50
            exit 1
          EOF

      - name: Health check
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            RESPONSE=$(curl -sf http://localhost:3001/health 2>&1) || true
            echo "Health response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"ok":true'; then
              echo "✅ Bot health check passed"
            else
              echo "⚠️  Health check inconclusive — check logs:"
              docker logs jitsi-bot --tail 30
            fi
          EOF
