name: Sync State to StorageBox
# Mirrors current server state to StorageBox via rsync over SSH (port 23).
# StorageBox always reflects the live server — no snapshots, no rotation.
# The state-sync script lives at /opt/backup/state-sync.sh (deployed by Ansible).
# Runs automatically at 2 AM daily (cron on server) and can be triggered manually here.
# After each sync a summary email is sent to ADMIN_EMAIL (EMAIL_ADDRESS secret).

on:
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    name: Sync state to StorageBox
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP || '46.224.49.30' }} >> ~/.ssh/known_hosts

      - name: Run state-sync on server
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP || '46.224.49.30' }} \
            "STORAGEBOX_HOST='${{ secrets.STORAGEBOX_HOST }}' \
             STORAGEBOX_USER='${{ secrets.STORAGEBOX_USER }}' \
             STORAGEBOX_PASSWORD='${{ secrets.STORAGEBOX_PASSWORD }}' \
             ADMIN_EMAIL='${{ secrets.EMAIL_ADDRESS }}' \
             DOMAIN_NAME='${{ secrets.DOMAIN_NAME }}' \
             /opt/backup/state-sync.sh"

      - name: Show StorageBox state summary
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP || '46.224.49.30' }} \
            "sshpass -p '${{ secrets.STORAGEBOX_PASSWORD }}' \
               rsync --list-only \
               -e 'ssh -p 23 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null' \
               '${{ secrets.STORAGEBOX_USER }}@${{ secrets.STORAGEBOX_HOST }}:/home/backups/hosts/caller/state/' \
             | head -40 || echo 'Could not list StorageBox state'"

