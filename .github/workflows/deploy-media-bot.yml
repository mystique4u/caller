name: Deploy Media Bot

on:
  push:
    branches:
      - main
    paths:
      - 'bots/media-bot/**'
      - 'ansible/tasks/bot-media.yml'
      - '.github/workflows/deploy-media-bot.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even without changes'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BOT_USERNAME: media-bot

# Required GitHub Secrets:
#   SSH_PRIVATE_KEY      — server SSH key                  (pre-existing)
#   TF_API_TOKEN         — Terraform Cloud token           (pre-existing)
#   DOMAIN_NAME          — your domain (e.g. example.com) (pre-existing)
#   EMAIL_ADDRESS        — destination for post-deploy email (pre-existing)
#   TELEGRAM_API_ID      — from my.telegram.org            (new)
#   TELEGRAM_API_HASH    — from my.telegram.org            (new)
#
# Bot password is auto-generated on first deploy and stored server-side only.
# It never enters GitHub Secrets or CI/CD logs.
# The bot creates its own Matrix account on first deploy (idempotent).

jobs:
  get-server-ip:
    name: Get Server IP from Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Get Server IP
        id: terraform_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT
          echo "✅ Server IP: $SERVER_IP"

  deploy-bot:
    name: Deploy Media Bot
    runs-on: ubuntu-latest
    needs: get-server-ip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH key
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${SERVER_IP} >> ~/.ssh/known_hosts

      - name: Validate required secrets
        env:
          DOMAIN_NAME:   ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          MISSING=()
          [[ -z "$DOMAIN_NAME" ]]   && MISSING+=("DOMAIN_NAME")
          [[ -z "$EMAIL_ADDRESS" ]] && MISSING+=("EMAIL_ADDRESS")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Missing required GitHub Secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Create bot data directory on server
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "mkdir -p /opt/services/bots/media-bot/data/media && \
             chmod 700 /opt/services/bots/media-bot/data"

      - name: Generate or load bot password (idempotent)
        id: creds
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          CREDS_FILE=/opt/services/bots/media-bot/.credentials
          EXISTING=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "cat ${CREDS_FILE} 2>/dev/null || true")

          if [[ -n "$EXISTING" ]]; then
            echo "🔑 Loading existing credentials from server"
            BOT_PASSWORD=$(echo "$EXISTING" | grep '^BOT_PASSWORD=' | cut -d= -f2-)
          else
            echo "🔑 Generating new credentials"
            BOT_PASSWORD=$(openssl rand -base64 32 | tr -d '=+/\n' | head -c 32)
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} bash << SSHEOF
          printf 'BOT_PASSWORD=%s\n' "${BOT_PASSWORD}" > ${CREDS_FILE}
          chmod 600 ${CREDS_FILE}
          SSHEOF
          fi

          echo "::add-mask::${BOT_PASSWORD}"
          echo "bot_password=${BOT_PASSWORD}" >> $GITHUB_OUTPUT

      - name: Sync bot files to server
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "📦 Syncing media-bot files to server..."
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.credentials' \
            --exclude='data/' \
            bots/media-bot/ root@${SERVER_IP}:/opt/services/bots/media-bot/

      - name: Register Matrix bot user (idempotent)
        env:
          SERVER_IP:    ${{ needs.get-server-ip.outputs.server_ip }}
          BOT_PASSWORD: ${{ steps.creds.outputs.bot_password }}
        run: |
          echo "Registering Matrix user: ${BOT_USERNAME}"
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker exec matrix-synapse register_new_matrix_user \
               -u ${BOT_USERNAME} -p '${BOT_PASSWORD}' \
               --no-admin -c /data/homeserver.yaml http://localhost:8008 2>&1" || true)
          if echo "$RESULT" | grep -q 'User ID already taken'; then
            echo "✅ Matrix user @${BOT_USERNAME} already exists"
          else
            echo "✅ Matrix user @${BOT_USERNAME} registered"
          fi

      - name: Write docker-compose override for media-bot
        env:
          SERVER_IP:        ${{ needs.get-server-ip.outputs.server_ip }}
          DOMAIN_NAME:      ${{ secrets.DOMAIN_NAME }}
          BOT_PASSWORD:     ${{ steps.creds.outputs.bot_password }}
          TELEGRAM_API_ID:  ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          cat > /tmp/docker-compose.media-bot.yml << YAML
          services:
            media-bot:
              build:
                context: /opt/services/bots/media-bot
                dockerfile: Dockerfile
              image: media-bot:latest
              container_name: media-bot
              restart: unless-stopped
              environment:
                - BOT_USERNAME=${BOT_USERNAME}
                - BOT_PASSWORD=${BOT_PASSWORD}
                - MATRIX_DOMAIN=${DOMAIN_NAME}
                - MATRIX_INTERNAL_URL=http://matrix-synapse:8008
                - MAX_FILE_SIZE_MB=250
                - TELEGRAM_API_ID=${TELEGRAM_API_ID}
                - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
                - PORT=3003
              volumes:
                - /opt/services/bots/media-bot/data:/data
              networks:
                - services_network
          networks:
            services_network:
              external: true
          YAML
          sed -i 's/^          //' /tmp/docker-compose.media-bot.yml
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            /tmp/docker-compose.media-bot.yml \
            root@${SERVER_IP}:/opt/services/docker-compose.media-bot.yml

      - name: Build and start media-bot container
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            set -e
            cd /opt/services
            echo "Building media-bot image..."
            docker build -t media-bot:latest /opt/services/bots/media-bot/ || {
              echo "❌ Docker build failed"; exit 1;
            }
            echo "Starting media-bot container..."
            docker rm -f media-bot 2>/dev/null || true
            docker compose -p media-bot -f docker-compose.media-bot.yml up -d media-bot
            echo "✅ Container started"
          EOF

      - name: Wait for bot to start
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "⏳ Waiting for media-bot to come up..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            for i in $(seq 1 20); do
              if docker ps | grep -q "media-bot.*Up"; then
                echo "✅ media-bot is running"
                exit 0
              fi
              echo "Waiting... ($i/20)"
              sleep 3
            done
            echo "❌ media-bot did not start in time"
            docker logs media-bot --tail 50
            exit 1
          EOF

      - name: Health check
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            RESPONSE=$(docker exec media-bot python3 -c \
              "import urllib.request; print(urllib.request.urlopen('http://localhost:3003/health').read().decode())" \
              2>&1) || true
            echo "Health response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"ok": true\|"ok":true'; then
              echo "✅ Bot health check passed"
            else
              echo "⚠️  Health check inconclusive — check logs:"
              docker logs media-bot --tail 30
            fi
          EOF

      - name: Send deployment notification email
        env:
          SERVER_IP:    ${{ needs.get-server-ip.outputs.server_ip }}
          DOMAIN_NAME:  ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          if [[ -z "$EMAIL_ADDRESS" ]]; then
            echo "EMAIL_ADDRESS not set — skipping notification"
            exit 0
          fi

          cat > /tmp/media-bot-notification.txt << BODY
          Media Bot Deployed — ${DOMAIN_NAME}

          Your media-bot is now running and watching for short-form media links.

            Bot Matrix ID  : @${BOT_USERNAME}:${DOMAIN_NAME}

          ── NEXT STEPS ────────────────────────────────────────────────
            1. In Element, invite the bot to your room:
               /invite @${BOT_USERNAME}:${DOMAIN_NAME}

            2. The bot needs admin rights to delete original messages.
               Go to room settings → Roles & Permissions → grant
               @${BOT_USERNAME}:${DOMAIN_NAME} the Moderator role
               (or Manage Messages permission).

            3. Post a link from a supported platform and the bot will
               download and repost it automatically.

          ── SUPPORTED PLATFORMS ───────────────────────────────────────
            • YouTube Shorts    youtube.com/shorts/...
            • Instagram Reels   instagram.com/reel/... or /p/...
            • TikTok            tiktok.com/... or vm.tiktok.com/...
            • Twitter / X       twitter.com/.../status/... or x.com/...
            • Telegram posts    t.me/<channel>/<id>

          ── TELEGRAM t.me DOWNLOADS ───────────────────────────────────
            If TELEGRAM_API_ID and TELEGRAM_API_HASH were set as GitHub
            Secrets, t.me/ links are enabled. However a one-time phone
            authentication is required on the server:

              ssh root@<server>
              docker exec -it media-bot python3 /app/setup_telegram_session.py

            (Takes ~30 seconds. The session is backed up daily and
            survives server restores — no re-auth needed after restore.)

          ── CREDENTIALS (server-side only) ────────────────────────────
            Bot password stored at:
            /opt/services/bots/media-bot/.credentials  (chmod 600)
            No new persistent GitHub Secrets were required for the password.

          ── LOGS ──────────────────────────────────────────────────────
            docker logs -f media-bot
          ──────────────────────────────────────────────────────────────
          BODY
          sed -i 's/^          //' /tmp/media-bot-notification.txt

          # Ensure noreply account exists on mailserver
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker ps | grep -q mailserver && \
             docker exec mailserver setup email add noreply@${DOMAIN_NAME} \
               \$(openssl rand -base64 24) 2>&1 | grep -v 'already exists' || true" || true

          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            /tmp/media-bot-notification.txt \
            root@${SERVER_IP}:/tmp/media-bot-notification.txt

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "python3 /opt/services/mailserver/send-email.py \
              '${EMAIL_ADDRESS}' \
              'Media Bot Deployed — ${DOMAIN_NAME}' \
              '/tmp/media-bot-notification.txt' && \
            rm -f /tmp/media-bot-notification.txt"

          echo "✅ Deployment notification sent to ${EMAIL_ADDRESS}"

      - name: Display deployment summary
        env:
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Media Bot Deployment Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "  Bot Matrix ID : @${BOT_USERNAME}:${DOMAIN_NAME}"
          echo ""
          echo "  Next steps:"
          echo "  1. /invite @${BOT_USERNAME}:${DOMAIN_NAME}  in your room"
          echo "  2. Grant Moderator role so the bot can delete messages"
          echo "  3. For t.me/ links: docker exec -it media-bot python3 /app/setup_telegram_session.py"
          echo ""
          echo "  View logs : docker logs -f media-bot"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
