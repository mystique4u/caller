name: Deploy Security Bot

on:
  push:
    branches:
      - main
    paths:
      - 'bots/security-bot/**'
      - 'ansible/tasks/bot-security.yml'
      - 'ansible/tasks/services.yml'
      - '.github/workflows/deploy-security-bot.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even without changes'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BOT_USERNAME: security-bot

# Required GitHub Secrets (all pre-existing, no new secrets needed):
#   SSH_PRIVATE_KEY    — server SSH key
#   TF_API_TOKEN       — Terraform Cloud token
#   DOMAIN_NAME        — your domain (e.g. example.com)
#   EMAIL_ADDRESS      — destination for post-deploy email
#   MATRIX_ADMIN_USER  — Matrix username to auto-invite to the alerts room
#                        (e.g. myadmin — without the @ or :domain suffix)
#
# Bot password and webhook secret are auto-generated on first deploy and
# stored in /opt/services/bots/security-bot/.credentials on the server.
# The bot creates its own Matrix room on startup and persists the room ID
# to /opt/services/bots/security-bot/data/room_id.txt.

jobs:
  get-server-ip:
    name: Get Server IP from Terraform
    runs-on: ubuntu-latest
    outputs:
      server_ip: ${{ steps.terraform_output.outputs.server_ip }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Get Server IP
        id: terraform_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw public_ip)
          echo "server_ip=$SERVER_IP" >> $GITHUB_OUTPUT
          echo "✅ Server IP: $SERVER_IP"

  deploy-bot:
    name: Deploy Security Bot
    runs-on: ubuntu-latest
    needs: get-server-ip

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH key
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${SERVER_IP} >> ~/.ssh/known_hosts

      - name: Validate required secrets
        env:
          DOMAIN_NAME:    ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS:  ${{ secrets.EMAIL_ADDRESS }}
        run: |
          MISSING=()
          [[ -z "$DOMAIN_NAME" ]]   && MISSING+=("DOMAIN_NAME")
          [[ -z "$EMAIL_ADDRESS" ]] && MISSING+=("EMAIL_ADDRESS")
          if [[ ${#MISSING[@]} -gt 0 ]]; then
            echo "❌ Missing required GitHub Secrets: ${MISSING[*]}"
            exit 1
          fi
          echo "✅ All required secrets present"

      - name: Create bot data directory on server
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "mkdir -p /opt/services/bots/security-bot/data && chmod 700 /opt/services/bots/security-bot/data"

      - name: Generate or load bot credentials (idempotent)
        id: creds
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          CREDS_FILE=/opt/services/bots/security-bot/.credentials
          EXISTING=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "cat ${CREDS_FILE} 2>/dev/null || true")

          NEW_CREDS=false
          if [[ -n "$EXISTING" ]]; then
            echo "🔑 Loading existing credentials from server"
            BOT_PASSWORD=$(echo "$EXISTING" | grep '^BOT_PASSWORD=' | cut -d= -f2-)
            WEBHOOK_SECRET=$(echo "$EXISTING" | grep '^WEBHOOK_SECRET=' | cut -d= -f2-)
          else
            echo "🔑 Generating new credentials"
            NEW_CREDS=true
            BOT_PASSWORD=$(openssl rand -base64 32 | tr -d '=+/\n' | head -c 32)
            WEBHOOK_SECRET=$(openssl rand -hex 32)
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} bash << SSHEOF
          printf 'BOT_PASSWORD=%s\nWEBHOOK_SECRET=%s\n' "${BOT_PASSWORD}" "${WEBHOOK_SECRET}" \
            > ${CREDS_FILE}
          chmod 600 ${CREDS_FILE}
          SSHEOF
          fi

          # Mask both values so they never appear in logs
          echo "::add-mask::${BOT_PASSWORD}"
          echo "::add-mask::${WEBHOOK_SECRET}"
          echo "bot_password=${BOT_PASSWORD}" >> $GITHUB_OUTPUT
          echo "webhook_secret=${WEBHOOK_SECRET}" >> $GITHUB_OUTPUT
          echo "new_creds=${NEW_CREDS}" >> $GITHUB_OUTPUT

      - name: Sync bot files to server
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "📦 Syncing security-bot files to server..."
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.credentials' \
            --exclude='data/' \
            bots/security-bot/ root@${SERVER_IP}:/opt/services/bots/security-bot/

      - name: Copy Prosody plugin
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "mkdir -p /opt/services/jitsi/prosody/prosody-plugins-custom && \
             cp /opt/services/bots/security-bot/prosody-plugin/mod_security_webhook.lua \
                /opt/services/jitsi/prosody/prosody-plugins-custom/"

      - name: Register Matrix bot user (idempotent)
        env:
          SERVER_IP:    ${{ needs.get-server-ip.outputs.server_ip }}
          BOT_PASSWORD: ${{ steps.creds.outputs.bot_password }}
          NEW_CREDS:    ${{ steps.creds.outputs.new_creds }}
        run: |
          echo "Registering Matrix user: ${BOT_USERNAME}"
          RESULT=$(ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker exec matrix-synapse register_new_matrix_user \
               -u ${BOT_USERNAME} -p '${BOT_PASSWORD}' \
               --no-admin -c /data/homeserver.yaml http://localhost:8008 2>&1" || true)
          if echo "$RESULT" | grep -q 'User ID already taken'; then
            if [[ "${NEW_CREDS}" == "true" ]]; then
              echo "🔄 User exists but credentials were regenerated — updating DB password"
              ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
                "ADMIN_TOKEN=\$(docker exec matrix-postgres psql -U synapse synapse -tAc \"SELECT token FROM access_tokens WHERE user_id IN (SELECT name FROM users WHERE admin=1) ORDER BY id DESC LIMIT 1;\") && docker exec matrix-synapse wget -q -O/dev/null --method=PUT --header=Content-Type:application/json --header=\"Authorization: Bearer \$ADMIN_TOKEN\" --body-data=\"{\\\"password\\\":\\\"${BOT_PASSWORD}\\\"}\" http://localhost:8008/_synapse/admin/v2/users/%40${BOT_USERNAME}%3A${MATRIX_DOMAIN} && echo OK"
            fi
          fi

      - name: Write docker-compose override for security-bot
        env:
          SERVER_IP:          ${{ needs.get-server-ip.outputs.server_ip }}
          DOMAIN_NAME:        ${{ secrets.DOMAIN_NAME }}
          BOT_PASSWORD:       ${{ steps.creds.outputs.bot_password }}
          WEBHOOK_SECRET:     ${{ steps.creds.outputs.webhook_secret }}
          MATRIX_ADMIN_USER:  ${{ secrets.MATRIX_ADMIN_USER }}
        run: |
          cat > /tmp/docker-compose.security-bot.yml << YAML
          services:
            security-bot:
              build:
                context: /opt/services/bots/security-bot
                dockerfile: Dockerfile
              image: security-bot:latest
              container_name: security-bot
              restart: unless-stopped
              environment:
                - BOT_USERNAME=${BOT_USERNAME}
                - BOT_PASSWORD=${BOT_PASSWORD}
                - MATRIX_DOMAIN=${DOMAIN_NAME}
                - MATRIX_INTERNAL_URL=http://matrix-synapse:8008
                - WEBHOOK_SECRET=${WEBHOOK_SECRET}
                - ADMIN_USER=@${MATRIX_ADMIN_USER}:${DOMAIN_NAME}
                - GEOIP_DB_PATH=/data/GeoLite2-City.mmdb
                - ALERT_ON_SUCCESS=true
                - RATE_LIMIT_WINDOW=300
                - POLL_INTERVAL=30
              volumes:
                - /var/log/auth.log:/var/log/auth.log:ro
                - /var/log/syslog:/var/log/syslog:ro
                - /opt/services/matrix/synapse:/synapse-logs:ro
                - /var/run/docker.sock:/var/run/docker.sock:ro
                - /opt/services/wireguard-ui/clients:/wgui-clients:ro
                - /opt/services/bots/security-bot/data:/data
              networks:
                - services_network
          networks:
            services_network:
              external: true
          YAML
          sed -i 's/^          //' /tmp/docker-compose.security-bot.yml
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            /tmp/docker-compose.security-bot.yml \
            root@${SERVER_IP}:/opt/services/docker-compose.security-bot.yml

      - name: Build and start security-bot container
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            set -e
            cd /opt/services
            echo "Building security-bot image..."
            docker build -t security-bot:latest /opt/services/bots/security-bot/ || {
              echo "❌ Docker build failed"; exit 1;
            }
            echo "Starting security-bot container..."
            docker rm -f security-bot 2>/dev/null || true
            docker compose -p security-bot -f docker-compose.security-bot.yml up -d security-bot
            echo "✅ Container started"
          EOF

      - name: Wire Prosody + Routemaker to security-bot webhook (idempotent)
        env:
          SERVER_IP:       ${{ needs.get-server-ip.outputs.server_ip }}
          WEBHOOK_SECRET:  ${{ steps.creds.outputs.webhook_secret }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << ENVSSH
            set -e
            COMPOSE=/opt/services/docker-compose.yml

            # --- Prosody ---
            if ! grep -q "security_webhook" "\$COMPOSE"; then
              sed -i "s|XMPP_MUC_MODULES=matrix_webhook|XMPP_MUC_MODULES=matrix_webhook,security_webhook|g" "\$COMPOSE"
              sed -i "/MATRIX_WEBHOOK_SECRET/a\\      - SECURITY_WEBHOOK_URL=http://security-bot:3002/webhook\\n      - SECURITY_WEBHOOK_SECRET=${WEBHOOK_SECRET}" "\$COMPOSE"
            else
              sed -i "s|SECURITY_WEBHOOK_SECRET=.*|SECURITY_WEBHOOK_SECRET=${WEBHOOK_SECRET}|g" "\$COMPOSE"
            fi
            cp /opt/services/bots/security-bot/prosody-plugin/mod_security_webhook.lua \
               /opt/services/jitsi/prosody/prosody-plugins-custom/
            cd /opt/services && docker compose up -d --force-recreate jitsi-prosody
            echo "✅ Prosody updated"

            # --- Routemaker ---
            if ! grep -q "SECURITY_BOT_WEBHOOK_URL" "\$COMPOSE"; then
              sed -i "/NODE_ENV=production/a\\      - SECURITY_BOT_WEBHOOK_URL=http://security-bot:3002/webhook/routemaker\\n      - SECURITY_BOT_SECRET=${WEBHOOK_SECRET}" "\$COMPOSE"
            else
              sed -i "s|SECURITY_BOT_SECRET=.*|SECURITY_BOT_SECRET=${WEBHOOK_SECRET}|g" "\$COMPOSE"
            fi
            cd /opt/services && docker compose up -d --force-recreate routemaker
            echo "✅ Routemaker updated"
          ENVSSH

      - name: Wait for bot to start
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          echo "⏳ Waiting for security-bot to come up..."
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            for i in $(seq 1 20); do
              if docker ps | grep -q "security-bot.*Up"; then
                echo "✅ security-bot is running"
                exit 0
              fi
              echo "Waiting... ($i/20)"
              sleep 3
            done
            echo "❌ security-bot did not start in time"
            docker logs security-bot --tail 50
            exit 1
          EOF

      - name: Health check
        env:
          SERVER_IP: ${{ needs.get-server-ip.outputs.server_ip }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} << 'EOF'
            RESPONSE=$(docker exec security-bot python3 -c \
              "import urllib.request; print(urllib.request.urlopen('http://localhost:3002/health').read().decode())" \
              2>&1) || true
            echo "Health response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"ok": true\|"ok":true'; then
              echo "✅ Bot health check passed"
            else
              echo "⚠️  Health check inconclusive — check logs:"
              docker logs security-bot --tail 30
            fi
          EOF

      - name: Send deployment notification email
        env:
          SERVER_IP:     ${{ needs.get-server-ip.outputs.server_ip }}
          DOMAIN_NAME:   ${{ secrets.DOMAIN_NAME }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
        run: |
          if [[ -z "$EMAIL_ADDRESS" ]]; then
            echo "EMAIL_ADDRESS not set — skipping notification"
            exit 0
          fi

          cat > /tmp/security-bot-notification.txt << BODY
          Security Bot Deployed — ${DOMAIN_NAME}

          Your security-bot is now running and monitoring:

            Bot Matrix ID  : @${BOT_USERNAME}:${DOMAIN_NAME}

          The bot creates its own monitoring room on first start and
          persists the room ID to /opt/services/bots/security-bot/data/room_id.txt.

          To find out which room it joined, run:
            ssh root@<server> 'docker logs security-bot | grep -i "room\|alert"'

          ── WHAT'S BEING MONITORED ────────────────────────────────────
            • SSH logins and failed attempts (with GeoIP)
            • VPN peer connect / disconnect events
            • WireGuard invalid handshake attempts
            • Matrix login success and failures
            • Routemaker login success and failures
            • Docker container crashes and OOM kills

          ── NEXT STEPS ────────────────────────────────────────────────
            1. In Element / your Matrix client, accept the invite from
               @${BOT_USERNAME}:${DOMAIN_NAME} or search for the room ID
               shown in: docker logs security-bot | grep "room_id"

            2. To use a specific existing room instead, set:
               MATRIX_ROOM=!yourRoomId:${DOMAIN_NAME}
               inside /opt/services/bots/security-bot/.credentials
               then restart: docker restart security-bot

            3. (Optional) Higher-accuracy GeoIP — place GeoLite2-City.mmdb in:
               /opt/services/bots/security-bot/data/
               (free download from https://dev.maxmind.com)

          ── CREDENTIALS (server-side only) ────────────────────────────
            Credentials are stored only on the server at:
            /opt/services/bots/security-bot/.credentials  (chmod 600)
            No new GitHub Secrets were required for this bot.

          ──────────────────────────────────────────────────────────────
          BODY
          sed -i 's/^          //' /tmp/security-bot-notification.txt

          # Ensure noreply account exists on mailserver
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "docker ps | grep -q mailserver && \
             docker exec mailserver setup email add noreply@${DOMAIN_NAME} \
               \$(openssl rand -base64 24) 2>&1 | grep -v 'already exists' || true" || true

          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            /tmp/security-bot-notification.txt \
            root@${SERVER_IP}:/tmp/security-bot-notification.txt

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa root@${SERVER_IP} \
            "python3 /opt/services/mailserver/send-email.py \
              '${EMAIL_ADDRESS}' \
              'Security Bot Deployed — ${DOMAIN_NAME}' \
              /tmp/security-bot-notification.txt" \
          && echo "✅ Notification emailed to ${EMAIL_ADDRESS}" \
          || echo "⚠️  Email send failed — details are in the logs above"

