name: Restore State from StorageBox
# Restores all persistent server state from StorageBox using the state-restore script.
# The script lives at /opt/backup/state-restore.sh (deployed by Ansible).
#
# Use this after deploying to new infrastructure (Terraform + Ansible) to recover
# all data: SSL certs, WireGuard peers, Matrix data, bot credentials, etc.
# Services are stopped before restore and restarted after.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type RESTORE to confirm (will overwrite current server state)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  restore:
    name: Restore state from StorageBox
    runs-on: ubuntu-latest

    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "RESTORE" ]; then
            echo "❌ Type RESTORE to confirm. Aborting."
            exit 1
          fi
          echo "✅ Confirmed"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP || '46.224.49.30' }} >> ~/.ssh/known_hosts

      - name: Run state-restore on server
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP || '46.224.49.30' }} \
            "STORAGEBOX_HOST='${{ secrets.STORAGEBOX_HOST }}' \
             STORAGEBOX_USER='${{ secrets.STORAGEBOX_USER }}' \
             STORAGEBOX_PASSWORD='${{ secrets.STORAGEBOX_PASSWORD }}' \
             /opt/backup/state-restore.sh"

      - name: Health checks
        run: |
          sleep 30
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP || '46.224.49.30' }} << 'EOF'
          echo "🏥 Health checks after restore:"
          curl -sf https://matrix.${{ secrets.DOMAIN_NAME }}/_matrix/client/versions > /dev/null \
            && echo "✅ Matrix OK" || echo "❌ Matrix FAILED"
          curl -sf https://chat.${{ secrets.DOMAIN_NAME }} > /dev/null \
            && echo "✅ Element OK" || echo "❌ Element FAILED"
          curl -sf https://meet.${{ secrets.DOMAIN_NAME }} > /dev/null \
            && echo "✅ Jitsi OK"  || echo "❌ Jitsi FAILED"
          curl -sf https://vpn.${{ secrets.DOMAIN_NAME }} > /dev/null \
            && echo "✅ WireGuard UI OK" || echo "❌ WireGuard UI FAILED"
          EOF

      - name: Summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Restore complete — all services restarted"
            echo "Verify functionality at your service URLs."
          else
            echo "❌ Restore failed — check logs above"
            echo "Services may be in an inconsistent state — manual intervention may be needed."
          fi

