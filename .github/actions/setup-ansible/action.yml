name: Setup Ansible
description: Setup Ansible and SSH configuration
inputs:
  server-ip:
    description: 'Server IP address'
    required: true
  ssh-private-key:
    description: 'SSH private key'
    required: true

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Ansible
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install ansible
    
    - name: Setup SSH key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        echo "${{ inputs.ssh-private-key }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ inputs.server-ip }} >> ~/.ssh/known_hosts
    
    - name: Create dynamic inventory
      shell: bash
      working-directory: ./ansible
      run: |
        cat > inventory.ini << EOF
        [wireguard]
        wireguard-vpn-server ansible_host=${{ inputs.server-ip }}

        [wireguard:vars]
        ansible_user=root
        ansible_python_interpreter=/usr/bin/python3
        ansible_ssh_common_args='-o StrictHostKeyChecking=no'
        EOF
